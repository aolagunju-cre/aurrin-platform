name: Auto-Dispatch Requeue

on:
  workflow_run:
    workflows: ["Pipeline Repo Assist", "Frontend Agent", "PRD Decomposer"]
    types: [completed]
  pull_request:
    types: [closed]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: auto-dispatch-requeue
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  requeue:
    # Skip runs where repo-assist had no activation (skipped) or was cancelled mid-run.
    # These are caused by [aw] Noop issues or other events with no /repo-assist command,
    # and there is nothing to requeue in those cases.
    if: |
      vars.PIPELINE_ACTIVE != 'false' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.title, '[Pipeline]')
        ) ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion != 'skipped' &&
          github.event.workflow_run.conclusion != 'cancelled'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PIPELINE_HEALING_ENABLED: ${{ vars.PIPELINE_HEALING_ENABLED }}
    steps:
      - name: Checkout repository helpers
        uses: actions/checkout@v4

      - name: Check healing pause switch
        id: healing
        run: |
          if scripts/healing-control.sh is-enabled; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=healing_paused" >> "$GITHUB_OUTPUT"
            echo "Autonomous healing is paused via PIPELINE_HEALING_ENABLED."
          fi

      - name: Retry transient provider failure for the same issue
        if: |
          steps.healing.outputs.skip != 'true' &&
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.name == 'Pipeline Repo Assist' &&
          (github.event.workflow_run.conclusion == 'failure' ||
           github.event.workflow_run.conclusion == 'timed_out')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          set -euo pipefail

          DISPATCH_MARKER='<!-- self-healing-dispatch:v1'
          RETRY_MARKER='<!-- provider-retry:v1'
          WORKFLOW_FILE='repo-assist.lock.yml'
          MAX_RETRIES=2

          read_marker_field() {
            local body=$1
            local field=$2
            printf '%s\n' "$body" | sed -n "s/^${field}=//p" | head -1
          }

          find_marker_comments() {
            local issue_number=$1
            local marker=$2
            gh api "/repos/${REPO}/issues/${issue_number}/comments?per_page=100" 2>/dev/null \
              | jq -c --arg marker "$marker" '[.[] | select(.body | contains($marker))]' || echo '[]'
          }

          LOGS=$(gh run view "$RUN_ID" --repo "$REPO" --log-failed 2>/dev/null || gh run view "$RUN_ID" --repo "$REPO" --log 2>/dev/null || true)
          LOGS_LOWER=$(printf '%s' "$LOGS" | tr '[:upper:]' '[:lower:]')
          if ! printf '%s' "$LOGS_LOWER" | grep -Eq 'request failed due to a transient api error|timed out after 60 minutes|streamable http error: session not found|rate limit|429|service unavailable'; then
            echo "Run ${RUN_ID} does not match the transient provider failure signature."
            exit 0
          fi

          OPEN_PRS=$(gh pr list --repo "$REPO" --state open --limit 100 --json body 2>/dev/null || echo '[]')
          LINKED_ISSUES=$(printf '%s' "$OPEN_PRS" | jq -r '.[].body // empty' 2>/dev/null \
            | bash scripts/extract-linked-issue-numbers.sh "$REPO" || true)
          PIPELINE_ISSUES=$(gh issue list --repo "$REPO" --label pipeline --state open --limit 200 --json number 2>/dev/null || echo '[]')

          ISSUE_NUMBER=""
          while IFS= read -r ISSUE_ROW; do
            [ -z "$ISSUE_ROW" ] && continue
            CANDIDATE=$(printf '%s' "$ISSUE_ROW" | jq -r '.number')
            COMMENTS_JSON=$(find_marker_comments "$CANDIDATE" "$DISPATCH_MARKER")
            MATCH_COUNT=$(printf '%s' "$COMMENTS_JSON" | jq --arg run_id "$RUN_ID" '[.[] | select((.body | contains("agent_run_id=" + $run_id)) or (.body | contains("repo_assist_run_id=" + $run_id)))] | length')
            if [ "${MATCH_COUNT:-0}" -gt 0 ]; then
              ISSUE_NUMBER="$CANDIDATE"
              break
            fi
          done < <(printf '%s' "$PIPELINE_ISSUES" | jq -c '.[]')

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No open pipeline issue is linked to failed run ${RUN_ID}."
            exit 0
          fi

          if printf '%s\n' "$LINKED_ISSUES" | grep -q "^${ISSUE_NUMBER}$"; then
            echo "Issue #${ISSUE_NUMBER} already has an open linked PR; skip automatic re-dispatch."
            exit 0
          fi

          RETRY_COMMENTS=$(find_marker_comments "$ISSUE_NUMBER" "$RETRY_MARKER")
          ALREADY_RETRIED=$(printf '%s' "$RETRY_COMMENTS" | jq --arg run_id "$RUN_ID" '[.[] | select(.body | contains("failed_run_id=" + $run_id))] | length')
          if [ "${ALREADY_RETRIED:-0}" -gt 0 ]; then
            echo "Run ${RUN_ID} already triggered a retry marker on issue #${ISSUE_NUMBER}."
            exit 0
          fi

          RETRY_COUNT=$(printf '%s' "$RETRY_COMMENTS" | jq --arg workflow_name "$WORKFLOW_NAME" '[.[] | select(.body | contains("workflow_name=" + $workflow_name))] | length')
          if [ "${RETRY_COUNT:-0}" -ge "$MAX_RETRIES" ]; then
            echo "Issue #${ISSUE_NUMBER} already used the transient retry budget."
            exit 0
          fi

          DISPATCHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          gh workflow run "$WORKFLOW_FILE" \
            --repo "$REPO" \
            -f issue_number="$ISSUE_NUMBER"

          AGENT_RUN_ID=""
          AGENT_RUN_URL=""
          for attempt in $(seq 1 12); do
            RUN_JSON=$(gh run list --repo "$REPO" \
              --workflow "$WORKFLOW_FILE" \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,createdAt,url \
              | jq --arg dispatched_at "$DISPATCHED_AT" '[.[] | select(.createdAt >= $dispatched_at)] | sort_by(.createdAt) | last // {}')
            AGENT_RUN_ID=$(printf '%s' "$RUN_JSON" | jq -r '.databaseId // ""')
            AGENT_RUN_URL=$(printf '%s' "$RUN_JSON" | jq -r '.url // ""')
            if [ -n "$AGENT_RUN_ID" ]; then
              break
            fi
            sleep 5
          done

          RETRY_NUMBER=$((RETRY_COUNT + 1))
          BODY=$(printf '%s\n' \
            '<!-- provider-retry:v1' \
            'dispatch_origin_workflow=Auto-Dispatch Requeue' \
            "workflow_name=${WORKFLOW_NAME}" \
            "workflow_file=${WORKFLOW_FILE}" \
            "failed_run_id=${RUN_ID}" \
            "failed_run_url=${RUN_URL}" \
            "retry_number=${RETRY_NUMBER}" \
            "agent_run_id=${AGENT_RUN_ID}" \
            "agent_run_url=${AGENT_RUN_URL}" \
            "dispatched_at=${DISPATCHED_AT}" \
            '-->' \
            '' \
            "Auto-retrying issue #${ISSUE_NUMBER} after a transient provider failure in ${WORKFLOW_NAME}.")
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$BODY" >/dev/null || \
            echo "::warning::Could not record transient retry marker on issue #${ISSUE_NUMBER}"

      - name: Retry patch apply failure for the same issue
        if: |
          steps.healing.outputs.skip != 'true' &&
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.name == 'Pipeline Repo Assist' &&
          github.event.workflow_run.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          set -euo pipefail

          DISPATCH_MARKER='<!-- self-healing-dispatch:v1'
          RETRY_MARKER='<!-- code-push-retry:v1'
          WORKFLOW_FILE='repo-assist.lock.yml'
          MAX_RETRIES=1

          read_marker_field() {
            local body=$1
            local field=$2
            printf '%s\n' "$body" | sed -n "s/^${field}=//p" | head -1
          }

          find_marker_comments() {
            local issue_number=$1
            local marker=$2
            gh api "/repos/${REPO}/issues/${issue_number}/comments?per_page=100" 2>/dev/null \
              | jq -c --arg marker "$marker" '[.[] | select(.body | contains($marker))]' || echo '[]'
          }

          LOGS=$(gh run view "$RUN_ID" --repo "$REPO" --log-failed 2>/dev/null || gh run view "$RUN_ID" --repo "$REPO" --log 2>/dev/null || true)
          LOGS_LOWER=$(printf '%s' "$LOGS" | tr '[:upper:]' '[:lower:]')
          if ! printf '%s' "$LOGS_LOWER" | grep -Eq 'failed to apply patch|could not build fake ancestor|sha1 information is lacking or useless'; then
            echo "Run ${RUN_ID} does not match the patch-apply failure signature."
            exit 0
          fi

          OPEN_PRS=$(gh pr list --repo "$REPO" --state open --limit 100 --json body 2>/dev/null || echo '[]')
          LINKED_ISSUES=$(printf '%s' "$OPEN_PRS" | jq -r '.[].body // empty' 2>/dev/null \
            | bash scripts/extract-linked-issue-numbers.sh "$REPO" || true)
          PIPELINE_ISSUES=$(gh issue list --repo "$REPO" --label pipeline --state open --limit 200 --json number 2>/dev/null || echo '[]')

          ISSUE_NUMBER=""
          while IFS= read -r ISSUE_ROW; do
            [ -z "$ISSUE_ROW" ] && continue
            CANDIDATE=$(printf '%s' "$ISSUE_ROW" | jq -r '.number')
            COMMENTS_JSON=$(find_marker_comments "$CANDIDATE" "$DISPATCH_MARKER")
            MATCH_COUNT=$(printf '%s' "$COMMENTS_JSON" | jq --arg run_id "$RUN_ID" '[.[] | select((.body | contains("agent_run_id=" + $run_id)) or (.body | contains("repo_assist_run_id=" + $run_id)))] | length')
            if [ "${MATCH_COUNT:-0}" -gt 0 ]; then
              ISSUE_NUMBER="$CANDIDATE"
              break
            fi
          done < <(printf '%s' "$PIPELINE_ISSUES" | jq -c '.[]')

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No open pipeline issue is linked to patch-apply failure run ${RUN_ID}."
            exit 0
          fi

          if printf '%s\n' "$LINKED_ISSUES" | grep -q "^${ISSUE_NUMBER}$"; then
            echo "Issue #${ISSUE_NUMBER} already has an open linked PR; skip patch-apply retry."
            exit 0
          fi

          RETRY_COMMENTS=$(find_marker_comments "$ISSUE_NUMBER" "$RETRY_MARKER")
          ALREADY_RETRIED=$(printf '%s' "$RETRY_COMMENTS" | jq --arg run_id "$RUN_ID" '[.[] | select(.body | contains("failed_run_id=" + $run_id))] | length')
          if [ "${ALREADY_RETRIED:-0}" -gt 0 ]; then
            echo "Run ${RUN_ID} already triggered a patch-apply retry marker on issue #${ISSUE_NUMBER}."
            exit 0
          fi

          RETRY_COUNT=$(printf '%s' "$RETRY_COMMENTS" | jq --arg workflow_name "$WORKFLOW_NAME" '[.[] | select(.body | contains("workflow_name=" + $workflow_name))] | length')
          if [ "${RETRY_COUNT:-0}" -ge "$MAX_RETRIES" ]; then
            echo "Issue #${ISSUE_NUMBER} already used the patch-apply retry budget."
            exit 0
          fi

          DISPATCHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          gh workflow run "$WORKFLOW_FILE" \
            --repo "$REPO" \
            -f issue_number="$ISSUE_NUMBER"

          AGENT_RUN_ID=""
          AGENT_RUN_URL=""
          for attempt in $(seq 1 12); do
            RUN_JSON=$(gh run list --repo "$REPO" \
              --workflow "$WORKFLOW_FILE" \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,createdAt,url \
              | jq --arg dispatched_at "$DISPATCHED_AT" '[.[] | select(.createdAt >= $dispatched_at)] | sort_by(.createdAt) | last // {}')
            AGENT_RUN_ID=$(printf '%s' "$RUN_JSON" | jq -r '.databaseId // ""')
            AGENT_RUN_URL=$(printf '%s' "$RUN_JSON" | jq -r '.url // ""')
            if [ -n "$AGENT_RUN_ID" ]; then
              break
            fi
            sleep 5
          done

          RETRY_NUMBER=$((RETRY_COUNT + 1))
          BODY=$(printf '%s\n' \
            '<!-- code-push-retry:v1' \
            'dispatch_origin_workflow=Auto-Dispatch Requeue' \
            "workflow_name=${WORKFLOW_NAME}" \
            "workflow_file=${WORKFLOW_FILE}" \
            "failed_run_id=${RUN_ID}" \
            "failed_run_url=${RUN_URL}" \
            "retry_number=${RETRY_NUMBER}" \
            "agent_run_id=${AGENT_RUN_ID}" \
            "agent_run_url=${AGENT_RUN_URL}" \
            "dispatched_at=${DISPATCHED_AT}" \
            '-->' \
            '' \
            "Auto-retrying issue #${ISSUE_NUMBER} after a patch-apply failure in ${WORKFLOW_NAME}.")
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$BODY" >/dev/null || \
            echo "::warning::Could not record patch-apply retry marker on issue #${ISSUE_NUMBER}"

      - name: Re-dispatch deferred actionable issue
        if: steps.healing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TRIGGER_RUN_ID: ${{ github.event.workflow_run.id || '' }}
          TRIGGER_WORKFLOW_NAME: ${{ github.event.workflow_run.name || '' }}
        run: |
          set -euo pipefail

          DEFERRED_MARKER='<!-- self-healing-dispatch-deferred:v1'
          DISPATCH_MARKER='<!-- self-healing-dispatch:v1'
          OUTCOME_MARKER='<!-- self-healing-dispatch-outcome:v1'
          MAX_STALE_REDISPATCHES=3
          DECOMPOSER_HANDOFF_READY="false"

          read_marker_field() {
            local body=$1
            local field=$2
            printf '%s\n' "$body" | sed -n "s/^${field}=//p" | head -1
          }

          find_marker_comments() {
            local issue_number=$1
            local marker=$2
            local comments_json
            comments_json=$(gh api "/repos/${REPO}/issues/${issue_number}/comments?per_page=100" 2>/dev/null || echo '[]')
            printf '%s' "$comments_json" | jq -c --arg marker "$marker" '[.[] | select(.body | contains($marker))]'
          }

          find_marker_comment() {
            local issue_number=$1
            local marker=$2
            printf '%s' "$(find_marker_comments "$issue_number" "$marker")" | jq -c 'last // {}'
          }

          find_matching_outcome_comment() {
            local issue_number=$1
            local agent_run_id=$2
            printf '%s' "$(find_marker_comments "$issue_number" "$OUTCOME_MARKER")" | jq -c --arg run_id "$agent_run_id" '
              [.[] | select(
                ($run_id == "") or
                ((.body | contains("agent_run_id=" + $run_id)) or (.body | contains("repo_assist_run_id=" + $run_id)))
              )] | last // {}'
          }

          dispatch_count_after() {
            local comments_json=$1
            local threshold=$2
            printf '%s' "$comments_json" | jq --arg threshold "$threshold" '
              [ .[]
                | . as $comment
                | ((try (.body | capture("(?m)^dispatched_at=(?<value>[^\\n]+)") | .value) catch "") // "") as $marker_time
                | (($marker_time | select(. != "")) // ($comment.created_at // "")) as $effective_time
                | select($effective_time != "" and $effective_time >= $threshold)
              ] | length'
          }

          run_state_json() {
            local run_id=$1
            if [ -z "$run_id" ]; then
              echo '{}'
              return
            fi
            gh run view "$run_id" --repo "$REPO" --json status,conclusion 2>/dev/null || echo '{}'
          }

          to_epoch() {
            local iso_value=$1
            date -u -d "$iso_value" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$iso_value" +%s 2>/dev/null || echo 0
          }

          workflow_active_count() {
            local workflow_file=$1
            gh run list --repo "$REPO" \
              --workflow "$workflow_file" \
              --limit 20 \
              --json databaseId,status \
              | jq '[.[] | select(.status == "in_progress" or .status == "queued")] | length'
          }

          live_issue_state() {
            local issue_number=$1
            gh issue view "$issue_number" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN"
          }

          record_deferred_marker() {
            local issue_number=$1
            local route=$2
            local workflow_file=$3
            local blocking_run_id=$4
            local blocking_run_url=$5
            local deferred_at body

            deferred_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            body=$(printf '%s\n' \
              '<!-- self-healing-dispatch-deferred:v1' \
              'dispatch_workflow=Auto-Dispatch Requeue' \
              "dispatch_workflow_run_id=${GITHUB_RUN_ID}" \
              "dispatch_workflow_run_url=https://github.com/${REPO}/actions/runs/${GITHUB_RUN_ID}" \
              "route=${route}" \
              "workflow_file=${workflow_file}" \
              "blocking_repo_assist_run_id=${blocking_run_id}" \
              "blocking_repo_assist_run_url=${blocking_run_url}" \
              "blocking_agent_run_id=${blocking_run_id}" \
              "blocking_agent_run_url=${blocking_run_url}" \
              "deferred_at=${deferred_at}" \
              '-->' \
              '' \
              "Self-healing audit marker: PRD Decomposer child handoff deferred while ${workflow_file} was already active.")
            gh issue comment "$issue_number" --repo "$REPO" --body "$body" >/dev/null || \
              echo "::warning::Could not record deferred dispatch marker on issue #${issue_number}"
          }

          cancel_superseded_repo_assist_runs() {
            local keep_run_id=$1
            local active_json stale_id

            [ -n "$keep_run_id" ] || return 0

            active_json=$(gh run list --repo "$REPO" \
              --workflow "Pipeline Repo Assist" \
              --limit 50 \
              --json databaseId,status \
              2>/dev/null || echo '[]')

            while IFS= read -r stale_id; do
              [ -n "$stale_id" ] || continue
              echo "Canceling superseded Pipeline Repo Assist run ${stale_id} after dispatching replacement ${keep_run_id}."
              gh run cancel "$stale_id" --repo "$REPO" >/dev/null 2>&1 || \
                echo "::warning::Could not cancel superseded Pipeline Repo Assist run ${stale_id}"
            done < <(printf '%s' "$active_json" | jq -r --arg keep "$keep_run_id" '
              .[]
              | select((.status == "queued") or (.status == "in_progress"))
              | select((.databaseId | tostring) != $keep)
              | .databaseId
            ')
          }

          open_dependency_numbers() {
            local issue_body=$1
            local blocked=()
            local dependency_number

            while IFS= read -r dependency_number; do
              [ -n "$dependency_number" ] || continue
              if printf '%s' "$OPEN_ISSUES" | jq -e --arg dep "$dependency_number" '[.[] | .number] | index(($dep | tonumber)) != null' >/dev/null; then
                blocked+=("#${dependency_number}")
              fi
            done < <(printf '%s' "$issue_body" | bash scripts/extract-issue-dependencies.sh)

            if [ "${#blocked[@]}" -gt 0 ]; then
              printf '%s\n' "${blocked[*]}"
            fi
          }

          ensure_dependency_blocked_label() {
            local issue_number=$1
            local labels_json=$2
            local blockers=$3

            [ -n "$blockers" ] || return 0

            if printf '%s' "$labels_json" | jq -e '[.[] | ascii_downcase] | index("blocked") != null' >/dev/null; then
              return 0
            fi

            gh issue edit "$issue_number" --repo "$REPO" --add-label blocked >/dev/null 2>&1 || \
              echo "::warning::Could not add blocked label to issue #${issue_number}"
          }

          find_issue_for_run() {
            local run_id=$1
            local comments_json
            local match_count

            [ -n "$run_id" ] || return 0

            while IFS= read -r issue_row; do
              [ -z "$issue_row" ] && continue
              local candidate
              candidate=$(printf '%s' "$issue_row" | jq -r '.number')
              comments_json=$(find_marker_comments "$candidate" "$DISPATCH_MARKER")
              match_count=$(printf '%s' "$comments_json" | jq --arg run_id "$run_id" '[.[] | select((.body | contains("agent_run_id=" + $run_id)) or (.body | contains("repo_assist_run_id=" + $run_id)))] | length')
              if [ "${match_count:-0}" -gt 0 ]; then
                printf '%s\n' "$candidate"
                return 0
              fi
            done < <(printf '%s' "$PIPELINE_ISSUES" | jq -c '.[]')
          }

          refresh_issue_snapshots() {
            OPEN_PRS=$(gh pr list --repo "$REPO" --state open --limit 100 --json body 2>/dev/null || echo '[]')
            LINKED_ISSUES=$(printf '%s' "$OPEN_PRS" | jq -r '.[].body // empty' 2>/dev/null \
              | bash scripts/extract-linked-issue-numbers.sh "$REPO" || true)
            OPEN_ISSUES=$(gh issue list --repo "$REPO" --state open --limit 500 --json number 2>/dev/null || echo '[]')
            PIPELINE_ISSUES=$(gh issue list --repo "$REPO" --label pipeline --state open --limit 200 \
              --json number,title,createdAt,labels,body 2>/dev/null || echo '[]')
            TRIGGER_ISSUE=$(find_issue_for_run "${TRIGGER_RUN_ID:-}")
          }

          ensure_decomposer_child_handoff() {
            local batch_children issue_row issue_num issue_body issue_classification issue_actionable issue_workflow issue_route issue_labels
            local blocking_dependencies issue_active active_runs_json blocking_run_id blocking_run_url deferred_json deferred_id

            if [ "${TRIGGER_WORKFLOW_NAME:-}" != "PRD Decomposer" ] || [ -z "${TRIGGER_RUN_ID:-}" ]; then
              return 0
            fi

            batch_children=$(printf '%s' "$PIPELINE_ISSUES" | jq -c --arg run_id "$TRIGGER_RUN_ID" '
              [ .[] | select((.body // "") | contains("actions/runs/" + $run_id)) ] | sort_by(.createdAt)
            ')

            while IFS= read -r issue_row; do
              [ -z "$issue_row" ] && continue
              issue_num=$(printf '%s' "$issue_row" | jq -r '.number')
              issue_body=$(printf '%s' "$issue_row" | jq -r '.body // ""')
              issue_classification=$(printf '%s' "$issue_row" | scripts/classify-pipeline-issue.sh)
              issue_actionable=$(printf '%s' "$issue_classification" | jq -r '.actionable')
              issue_workflow=$(printf '%s' "$issue_classification" | jq -r '.workflow_file')
              issue_route=$(printf '%s' "$issue_classification" | jq -r '.route')
              issue_labels=$(printf '%s' "$issue_row" | jq -c '[.labels[]?.name // empty]')

              if [ "$issue_actionable" != "true" ]; then
                continue
              fi

              if printf '%s\n' "$LINKED_ISSUES" | grep -q "^${issue_num}$"; then
                continue
              fi

              blocking_dependencies=$(open_dependency_numbers "$issue_body" || true)
              if [ -n "$blocking_dependencies" ]; then
                ensure_dependency_blocked_label "$issue_num" "$issue_labels" "$blocking_dependencies"
                continue
              fi

              issue_active=$(workflow_active_count "$issue_workflow")
              if [ "${issue_active:-0}" -le 0 ]; then
                continue
              fi

              deferred_json=$(find_marker_comment "$issue_num" "$DEFERRED_MARKER")
              deferred_id=$(printf '%s' "$deferred_json" | jq -r '.id // empty')
              if [ -z "$deferred_id" ]; then
                active_runs_json=$(gh run list --repo "$REPO" \
                  --workflow "$issue_workflow" \
                  --limit 20 \
                  --json databaseId,status,event,url,createdAt \
                  | jq '[.[] | select((.status == "in_progress" or .status == "queued") and .event == "workflow_dispatch")] | sort_by(.createdAt)')
                blocking_run_id=$(printf '%s' "$active_runs_json" | jq -r '.[0].databaseId // ""')
                blocking_run_url=$(printf '%s' "$active_runs_json" | jq -r '.[0].url // ""')
                record_deferred_marker "$issue_num" "$issue_route" "$issue_workflow" "$blocking_run_id" "$blocking_run_url"
                echo "Issue #${issue_num}: recorded deferred PRD Decomposer handoff behind active ${issue_workflow} run ${blocking_run_id}."
              else
                echo "Issue #${issue_num}: existing deferred handoff marker already covers this PRD Decomposer batch."
              fi

              DECOMPOSER_HANDOFF_READY="true"
              break
            done < <(printf '%s' "$batch_children" | jq -c '.[]')
          }

          select_candidate_issue() {
            SELECTED_ISSUE=""
            SELECTED_WORKFLOW=""
            SELECTED_ROUTE=""
            SELECTED_REASON=""
            FALLBACK_ISSUE=""
            FALLBACK_WORKFLOW=""
            FALLBACK_ROUTE=""

            while IFS= read -r ISSUE_ROW; do
              [ -z "$ISSUE_ROW" ] && continue
              ISSUE_NUM=$(printf '%s' "$ISSUE_ROW" | jq -r '.number')
              ISSUE_BODY=$(printf '%s' "$ISSUE_ROW" | jq -r '.body // ""')

              ISSUE_CLASSIFICATION=$(printf '%s' "$ISSUE_ROW" | scripts/classify-pipeline-issue.sh)
              ISSUE_ACTIONABLE=$(printf '%s' "$ISSUE_CLASSIFICATION" | jq -r '.actionable')
              ISSUE_WORKFLOW=$(printf '%s' "$ISSUE_CLASSIFICATION" | jq -r '.workflow_file')
              ISSUE_ROUTE=$(printf '%s' "$ISSUE_CLASSIFICATION" | jq -r '.route')
              ISSUE_LABELS=$(printf '%s' "$ISSUE_ROW" | jq -c '[.labels[]?.name // empty]')
              if [ "$ISSUE_ACTIONABLE" != "true" ]; then
                ISSUE_REASON=$(printf '%s' "$ISSUE_CLASSIFICATION" | jq -r '.reason')
                echo "Issue #${ISSUE_NUM}: skipping non-actionable issue (${ISSUE_REASON})."
                continue
              fi

              if printf '%s\n' "$LINKED_ISSUES" | grep -q "^${ISSUE_NUM}$"; then
                echo "Issue #${ISSUE_NUM}: already has an open linked PR."
                continue
              fi

              BLOCKING_DEPENDENCIES=$(open_dependency_numbers "$ISSUE_BODY" || true)
              if [ -n "$BLOCKING_DEPENDENCIES" ]; then
                ensure_dependency_blocked_label "$ISSUE_NUM" "$ISSUE_LABELS" "$BLOCKING_DEPENDENCIES"
                echo "Issue #${ISSUE_NUM}: waiting on open dependencies ${BLOCKING_DEPENDENCIES}."
                continue
              fi

              ISSUE_ACTIVE=$(workflow_active_count "$ISSUE_WORKFLOW")
              if [ "${ISSUE_ACTIVE:-0}" -gt 0 ]; then
                echo "Issue #${ISSUE_NUM}: ${ISSUE_WORKFLOW} already active (${ISSUE_ACTIVE} run(s)); checking next queued issue."
                continue
              fi

              DEFERRED_JSON=$(find_marker_comment "$ISSUE_NUM" "$DEFERRED_MARKER")
              DEFERRED_ID=$(printf '%s' "$DEFERRED_JSON" | jq -r '.id // empty')
              if [ -z "$DEFERRED_ID" ]; then
                if [ -n "$TRIGGER_ISSUE" ] && [ "$ISSUE_NUM" = "$TRIGGER_ISSUE" ]; then
                  echo "Issue #${ISSUE_NUM}: skipping immediate re-dispatch of the just-completed issue."
                  continue
                fi

                if [ -z "$FALLBACK_ISSUE" ]; then
                  FALLBACK_ISSUE="$ISSUE_NUM"
                  FALLBACK_WORKFLOW="$ISSUE_WORKFLOW"
                  FALLBACK_ROUTE="$ISSUE_ROUTE"
                fi
                continue
              fi

              DEFERRED_AT=$(printf '%s' "$DEFERRED_JSON" | jq -r '.created_at // empty')
              if [ -z "$DEFERRED_AT" ]; then
                DEFERRED_BODY=$(printf '%s' "$DEFERRED_JSON" | jq -r '.body // ""')
                DEFERRED_AT=$(read_marker_field "$DEFERRED_BODY" "deferred_at")
              fi

              DISPATCH_COMMENTS=$(find_marker_comments "$ISSUE_NUM" "$DISPATCH_MARKER")
              DISPATCH_JSON=$(find_marker_comment "$ISSUE_NUM" "$DISPATCH_MARKER")
              DISPATCH_BODY=$(printf '%s' "$DISPATCH_JSON" | jq -r '.body // ""')
              DISPATCHED_AT=$(read_marker_field "$DISPATCH_BODY" "dispatched_at")
              if [ -z "$DISPATCHED_AT" ]; then
                DISPATCHED_AT=$(printf '%s' "$DISPATCH_JSON" | jq -r '.created_at // empty')
              fi

              if [ -n "$DISPATCHED_AT" ] && [ "$(to_epoch "$DISPATCHED_AT")" -ge "$(to_epoch "$DEFERRED_AT")" ]; then
                DISPATCH_COUNT_AFTER_DEFERRED=$(dispatch_count_after "$DISPATCH_COMMENTS" "$DEFERRED_AT")
                AGENT_RUN_ID=$(read_marker_field "$DISPATCH_BODY" "agent_run_id")
                if [ -z "$AGENT_RUN_ID" ]; then
                  AGENT_RUN_ID=$(read_marker_field "$DISPATCH_BODY" "repo_assist_run_id")
                fi

                OUTCOME_JSON=$(find_matching_outcome_comment "$ISSUE_NUM" "$AGENT_RUN_ID")
                OUTCOME_BODY=$(printf '%s' "$OUTCOME_JSON" | jq -r '.body // ""')
                OUTCOME_VALUE=$(read_marker_field "$OUTCOME_BODY" "outcome")
                OUTCOME_RECORDED_AT=$(read_marker_field "$OUTCOME_BODY" "recorded_at")
                if [ -z "$OUTCOME_RECORDED_AT" ]; then
                  OUTCOME_RECORDED_AT=$(printf '%s' "$OUTCOME_JSON" | jq -r '.created_at // empty')
                fi

                if [ -n "$OUTCOME_VALUE" ] && { [ -z "$OUTCOME_RECORDED_AT" ] || [ "$(to_epoch "$OUTCOME_RECORDED_AT")" -ge "$(to_epoch "$DISPATCHED_AT")" ]; }; then
                  case "$OUTCOME_VALUE" in
                    already_covered|non_actionable)
                      echo "Issue #${ISSUE_NUM}: latest targeted dispatch reported terminal outcome '${OUTCOME_VALUE}'."
                      continue
                      ;;
                    *)
                      if [ "${DISPATCH_COUNT_AFTER_DEFERRED:-0}" -ge "$MAX_STALE_REDISPATCHES" ]; then
                        echo "Issue #${ISSUE_NUM}: latest targeted dispatch outcome is '${OUTCOME_VALUE}', but stale re-dispatch retry cap (${MAX_STALE_REDISPATCHES}) is already exhausted."
                        continue
                      fi
                      echo "Issue #${ISSUE_NUM}: latest targeted dispatch outcome is '${OUTCOME_VALUE}'; allowing bounded re-dispatch."
                      ;;
                  esac
                else
                  RUN_STATE=$(run_state_json "$AGENT_RUN_ID")
                  RUN_STATUS=$(printf '%s' "$RUN_STATE" | jq -r '.status // ""')
                  RUN_CONCLUSION=$(printf '%s' "$RUN_STATE" | jq -r '.conclusion // ""')

                  if [ "$RUN_STATUS" = "queued" ] || [ "$RUN_STATUS" = "in_progress" ]; then
                    echo "Issue #${ISSUE_NUM}: latest dispatched run ${AGENT_RUN_ID} is still ${RUN_STATUS}."
                    continue
                  fi

                  if [ "${DISPATCH_COUNT_AFTER_DEFERRED:-0}" -ge "$MAX_STALE_REDISPATCHES" ]; then
                    echo "Issue #${ISSUE_NUM}: dispatch marker is stale, but bounded re-dispatch retry cap (${MAX_STALE_REDISPATCHES}) is exhausted."
                    continue
                  fi

                  if [ -n "$AGENT_RUN_ID" ]; then
                    echo "Issue #${ISSUE_NUM}: dispatched run ${AGENT_RUN_ID} completed (${RUN_CONCLUSION:-unknown}) without a terminal outcome marker; allowing re-dispatch."
                  else
                    echo "Issue #${ISSUE_NUM}: dispatch marker lacks a linked agent run; allowing re-dispatch."
                  fi
                fi
              fi

              SELECTED_ISSUE="$ISSUE_NUM"
              SELECTED_WORKFLOW="$ISSUE_WORKFLOW"
              SELECTED_ROUTE="$ISSUE_ROUTE"
              SELECTED_REASON="requeue_after_guard_skip"
              break
            done < <(printf '%s' "$PIPELINE_ISSUES" | jq -c 'sort_by(.createdAt)[]')

            if [ -z "$SELECTED_ISSUE" ]; then
              SELECTED_ISSUE="$FALLBACK_ISSUE"
              SELECTED_WORKFLOW="$FALLBACK_WORKFLOW"
              SELECTED_ROUTE="$FALLBACK_ROUTE"
              SELECTED_REASON="requeue_backlog_fallback"
            fi
          }

          refresh_issue_snapshots
          ensure_decomposer_child_handoff
          select_candidate_issue

          if [ -z "$SELECTED_ISSUE" ]; then
            if [ "$DECOMPOSER_HANDOFF_READY" = "true" ]; then
              echo "PRD Decomposer created actionable child issues, and a deferred handoff marker is in place behind the active repo-assist lane."
              exit 0
            fi
            echo "No deferred actionable issues require re-dispatch and no backlog fallback candidate is ready."
            exit 0
          fi

          for refresh_attempt in 1 2 3; do
            LIVE_STATE=$(live_issue_state "$SELECTED_ISSUE")
            if [ "$LIVE_STATE" = "OPEN" ]; then
              break
            fi

            echo "Issue #${SELECTED_ISSUE}: selected from a stale snapshot but current state is ${LIVE_STATE}; refreshing queue selection (attempt ${refresh_attempt}/3)."
            refresh_issue_snapshots
            select_candidate_issue

            if [ -z "$SELECTED_ISSUE" ]; then
              echo "No deferred actionable issues require re-dispatch and no backlog fallback candidate is ready after refreshing the queue."
              exit 0
            fi
          done

          LIVE_STATE=$(live_issue_state "$SELECTED_ISSUE")
          if [ "$LIVE_STATE" != "OPEN" ]; then
            echo "Issue #${SELECTED_ISSUE}: current state is ${LIVE_STATE}; aborting stale re-dispatch after refresh attempts."
            exit 0
          fi

          ISSUE_BODY=$(gh issue view "$SELECTED_ISSUE" --repo "$REPO" --json body --jq '.body // ""')
          REPAIR_JSON=$(printf '%s' "$ISSUE_BODY" | scripts/repair-issue-contract-paths.sh)
          REPAIR_CHANGED=$(printf '%s' "$REPAIR_JSON" | jq -r '.changed')
          if [ "$REPAIR_CHANGED" = "true" ]; then
            TMP_BODY=$(mktemp)
            trap 'rm -f "$TMP_BODY"' EXIT
            printf '%s' "$REPAIR_JSON" | jq -r '.body' > "$TMP_BODY"
            gh issue edit "$SELECTED_ISSUE" --repo "$REPO" --body-file "$TMP_BODY"

            REMOVED_LIST=$(printf '%s' "$REPAIR_JSON" | jq -r '.removed_paths[] | "- `" + . + "`"')
            COMMENT_BODY=$(printf '%s\n%s\n%s\n%s\n%s\n%s' \
              '<!-- contract-path-self-heal:v1 -->' \
              'Auto-repaired `## Existing Contracts to Read` before re-dispatch by removing nonexistent repo paths:' \
              '' \
              "$REMOVED_LIST" \
              '' \
              'Re-dispatch will continue using the remaining existing contract files.')
            gh issue comment "$SELECTED_ISSUE" --repo "$REPO" --body "$COMMENT_BODY" >/dev/null || \
              echo "::warning::Could not record contract path self-heal comment on issue #${SELECTED_ISSUE}"
          fi

          echo "Re-dispatching issue #${SELECTED_ISSUE} via ${SELECTED_WORKFLOW} (route: ${SELECTED_ROUTE}, reason: ${SELECTED_REASON})."
          DISPATCHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if [ "$SELECTED_WORKFLOW" = "repo-assist.lock.yml" ] || [ "$SELECTED_WORKFLOW" = "prd-decomposer.lock.yml" ]; then
            gh workflow run "$SELECTED_WORKFLOW" \
              --repo "$REPO" \
              -f issue_number="$SELECTED_ISSUE"
          else
            gh workflow run "$SELECTED_WORKFLOW" \
              --repo "$REPO"
          fi

          AGENT_RUN_ID=""
          AGENT_RUN_URL=""
          for attempt in $(seq 1 12); do
            RUN_JSON=$(gh run list --repo "$REPO" \
              --workflow "$SELECTED_WORKFLOW" \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,createdAt,url \
              | jq --arg dispatched_at "$DISPATCHED_AT" '[.[] | select(.createdAt >= $dispatched_at)] | sort_by(.createdAt) | last // {}')
            AGENT_RUN_ID=$(printf '%s' "$RUN_JSON" | jq -r '.databaseId // ""')
            AGENT_RUN_URL=$(printf '%s' "$RUN_JSON" | jq -r '.url // ""')
            if [ -n "$AGENT_RUN_ID" ]; then
              break
            fi
            sleep 5
          done

          if [ "$SELECTED_WORKFLOW" = "repo-assist.lock.yml" ] && [ -n "$AGENT_RUN_ID" ]; then
            cancel_superseded_repo_assist_runs "$AGENT_RUN_ID"
          fi

          MARKER_BODY=$(printf '%s\n' \
            '<!-- self-healing-dispatch:v1' \
            'dispatch_workflow=Auto-Dispatch Pipeline Issues' \
            'dispatch_origin_workflow=Auto-Dispatch Requeue' \
            "dispatch_reason=${SELECTED_REASON}" \
            "route=${SELECTED_ROUTE}" \
            "workflow_file=${SELECTED_WORKFLOW}" \
            "dispatch_workflow_run_id=${GITHUB_RUN_ID}" \
            "dispatch_workflow_run_url=https://github.com/${REPO}/actions/runs/${GITHUB_RUN_ID}" \
            "repo_assist_run_id=${AGENT_RUN_ID}" \
            "repo_assist_run_url=${AGENT_RUN_URL}" \
            "agent_run_id=${AGENT_RUN_ID}" \
            "agent_run_url=${AGENT_RUN_URL}" \
            "dispatched_at=${DISPATCHED_AT}" \
            '-->')
          gh issue comment "$SELECTED_ISSUE" --repo "$REPO" --body "$MARKER_BODY" >/dev/null || \
            echo "::warning::Could not record re-dispatch marker on issue #${SELECTED_ISSUE}"
