#
# PR Review Submit — Watches for pr-review-agent verdict comments and submits
# the formal GitHub review as github-actions[bot].
#
# This is a standard GitHub Actions workflow (not an agentic .md workflow)
# so that it submits the formal review with GITHUB_TOKEN
# (github-actions[bot] identity). This ensures a different identity from the
# GitHub App that creates PRs, avoiding GitHub's self-approval restriction.
# For approved pipeline PRs, the auto-merge command intentionally switches to
# GH_AW_GITHUB_TOKEN so the resulting push to main can trigger downstream
# deploy workflows.
#
# Flow:
#   1. pr-review-agent posts a verdict comment starting with [PIPELINE-VERDICT]
#   2. This workflow fires on issue_comment:created, detects the marker
#   3. Parses APPROVE or REQUEST_CHANGES from the comment body
#   4. Submits the formal GitHub review as github-actions[bot]
#   5. On APPROVE: marks draft PRs ready, enables auto-merge for [Pipeline] PRs
#   6. If PIPELINE_MVP_MODE=true, pipeline PRs are admin-merged even on REQUEST_CHANGES
#   7. Dispatches the owning agent for next cycle (APPROVE) or posts the owning agent command (REQUEST_CHANGES)
#
# Break-glass: workflow_dispatch allows manual review submission when the
# comment-based flow is blocked (e.g., action_required on first-time contributor).
#

name: "PR Review Submit"

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to submit review for"
        required: true
        type: number
      verdict:
        description: "Review verdict"
        required: true
        type: choice
        options:
          - APPROVE
          - REQUEST_CHANGES
      summary:
        description: "Review summary"
        required: false
        type: string
        default: "Manual break-glass review submission."

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  statuses: write

# ---------------------------------------------------------------------------
# Job 1: issue_comment trigger — automated path
# ---------------------------------------------------------------------------
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  submit-review-comment:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '[PIPELINE-VERDICT]') &&
      contains(github.event.comment.body, 'gh-aw-agentic-workflow: Pipeline Review Agent')

    concurrency:
      group: "pr-review-submit-${{ github.event.issue.number }}"
      cancel-in-progress: false

    env:
      PIPELINE_HEALING_ENABLED: ${{ vars.PIPELINE_HEALING_ENABLED }}

    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/healing-control.sh
            scripts/check-autonomy-policy.sh
            scripts/classify-pipeline-pr.sh
            scripts/extract-linked-issue-numbers.sh
            autonomy-policy.yml
          sparse-checkout-cone-mode: false

      - name: Check healing pause switch
        id: healing
        run: |
          if scripts/healing-control.sh is-enabled; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Autonomous healing is paused via PIPELINE_HEALING_ENABLED."
          fi

      - name: Verify verdict comment author has write access
        id: check-access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PERM=$(gh api repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission \
            --jq '.permission' 2>/dev/null || echo "none")
          if [[ "$PERM" != "admin" && "$PERM" != "write" && "$PERM" != "maintain" ]]; then
            echo "::error::User ${{ github.event.comment.user.login }} does not have write access"
            exit 1
          fi
          echo "approved_by=${{ github.event.comment.user.login }}" >> "$GITHUB_OUTPUT"

      - name: Resolve review actor login
        id: review-actor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          LOGIN=$(gh api user --jq '.login' 2>/dev/null || echo "github-actions[bot]")
          echo "login=${LOGIN}" >> "$GITHUB_OUTPUT"

      - name: Check idempotency (skip if same verdict already reviewed at current HEAD)
        id: idempotency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          REVIEW_ACTOR_LOGIN: ${{ steps.review-actor.outputs.login }}
        run: |
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

          COMMENT_BODY=$(gh api "/repos/${REPO}/issues/comments/${COMMENT_ID}" --jq '.body')
          TARGET_VERDICT=$(echo "$COMMENT_BODY" | grep -oP '\*\*VERDICT:\s*\K(APPROVE|REQUEST_CHANGES)' | head -1 || true)
          if [ "$TARGET_VERDICT" = "APPROVE" ]; then
            TARGET_STATE="APPROVED"
          else
            TARGET_STATE="CHANGES_REQUESTED"
          fi
          echo "target_state=${TARGET_STATE}" >> "$GITHUB_OUTPUT"

          EXISTING=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --jq "[.[] | select(.user.login == \"${REVIEW_ACTOR_LOGIN}\" and .commit_id == \"${HEAD_SHA}\" and .state == \"${TARGET_STATE}\")] | length" \
            2>/dev/null || echo "0")

          if [ "$EXISTING" -gt 0 ]; then
            echo "Already reviewed with ${TARGET_STATE} at head SHA ${HEAD_SHA}. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing ${TARGET_STATE} review at ${HEAD_SHA}. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse verdict and submit review
        if: steps.idempotency.outputs.skip != 'true'
        continue-on-error: ${{ vars.PIPELINE_MVP_MODE == 'true' }}
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_AW_GITHUB_TOKEN }}
          COMMENT_ID: ${{ github.event.comment.id }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch the comment body via API to avoid direct shell exposure to user content
          COMMENT_BODY=$(gh api "/repos/${REPO}/issues/comments/${COMMENT_ID}" \
            --jq '.body')
          COMMENT_URL=$(gh api "/repos/${REPO}/issues/comments/${COMMENT_ID}" \
            --jq '.html_url')

          # Extract verdict — default to REQUEST_CHANGES if not parseable (fail-safe)
          VERDICT=$(echo "$COMMENT_BODY" | grep -oP '\*\*VERDICT:\s*\K(APPROVE|REQUEST_CHANGES)' | head -1 || echo "")
          if [ "$VERDICT" != "APPROVE" ] && [ "$VERDICT" != "REQUEST_CHANGES" ]; then
            echo "::warning::Could not parse verdict from comment, defaulting to REQUEST_CHANGES"
            VERDICT="REQUEST_CHANGES"
          fi
          echo "verdict=${VERDICT}" >> "$GITHUB_OUTPUT"
          echo "Parsed verdict: ${VERDICT}"

          # Extract summary (first non-empty line after "### Summary")
          SUMMARY=$(echo "$COMMENT_BODY" | awk '/^### Summary/{found=1; next} found && /^[^[:space:]]/{print; exit} found && /^[[:space:]]*$/{next} found{print; exit}' | head -1 || echo "Review completed.")
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

          # Get PR title for [Pipeline] detection and linked issue extraction
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title --jq '.title')
          echo "pr_title=${PR_TITLE}" >> "$GITHUB_OUTPUT"

          ISSUE_NUMBER=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body // ""' \
            | bash scripts/extract-linked-issue-numbers.sh "$REPO" \
            | head -1 || true)
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

          if [ "$VERDICT" = "APPROVE" ]; then
            REVIEW_BODY="## Pipeline Review — Approved"$'\n\n'"See the full Pipeline Review Agent verdict in [the linked comment](${COMMENT_URL})."$'\n\n'"**Summary**: ${SUMMARY}"$'\n\n'"---"$'\n'"*Submitted by PR Review Submit.*"
          else
            REVIEW_BODY="## Pipeline Review — Changes Requested"$'\n\n'"See the full Pipeline Review Agent verdict in [the linked comment](${COMMENT_URL})."$'\n\n'"**Summary**: ${SUMMARY}"$'\n\n'"---"$'\n'"*Submitted by PR Review Submit.*"
          fi

          # Submit the formal review using the configured automation credential.
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            -f event="${VERDICT}" \
            -f body="${REVIEW_BODY}"

          echo "Submitted ${VERDICT} review on PR #${PR_NUMBER}"

      - name: Set review status check
        if: always() && steps.idempotency.outputs.head_sha != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_AW_GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.idempotency.outputs.head_sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          REVIEW_ACTOR_LOGIN: ${{ steps.review-actor.outputs.login }}
        run: |
          # The "review" status check is required by the branch protection ruleset.
          # Always set it — even if the review step was skipped by idempotency,
          # the status check may still be missing from a prior run.
          VERDICT="${{ steps.review.outputs.verdict }}"
          if [ -z "$VERDICT" ]; then
            # Review was skipped — check existing review to determine verdict
            VERDICT=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --jq "[.[] | select(.user.login == \"${REVIEW_ACTOR_LOGIN}\")] | last | .state // \"\"" || echo "")
          fi
          if [ -z "$VERDICT" ]; then
            echo "No verdict available — skipping status check"
            exit 0
          fi
          gh api --method POST "/repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state="success" \
            -f context="review" \
            -f description="Review completed: ${VERDICT}"
          echo "Set 'review' status check to success on ${HEAD_SHA} (verdict: ${VERDICT})"

      - name: Mark draft PR ready (APPROVE or MVP mode)
        if: steps.idempotency.outputs.skip != 'true' && (steps.review.outputs.verdict == 'APPROVE' || vars.PIPELINE_MVP_MODE == 'true')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_DRAFT=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json isDraft -q '.isDraft')
          if [ "$PR_DRAFT" = "true" ]; then
            gh pr ready "$PR_NUMBER" --repo "$REPO" || echo "::warning::Could not mark PR as ready"
          else
            echo "PR #${PR_NUMBER} is already ready for review."
          fi

      - name: Evaluate autonomy policy for autonomous merge (APPROVE only)
        if: steps.idempotency.outputs.skip != 'true' && steps.review.outputs.verdict == 'APPROVE'
        id: policy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          echo "blocked=false" >> "$GITHUB_OUTPUT"
          echo "blocked_action=" >> "$GITHUB_OUTPUT"
          echo "blocked_file=" >> "$GITHUB_OUTPUT"
          echo "blocked_reason=" >> "$GITHUB_OUTPUT"

          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title,headRefName,baseRefName,author)
          PIPELINE_JSON=$(printf '%s' "$PR_JSON" | bash scripts/classify-pipeline-pr.sh)
          PIPELINE_PR=$(printf '%s' "$PIPELINE_JSON" | jq -r '.pipeline_pr')
          PIPELINE_REASON=$(printf '%s' "$PIPELINE_JSON" | jq -r '.reason')

          echo "pipeline_pr=${PIPELINE_PR}" >> "$GITHUB_OUTPUT"
          echo "pipeline_reason=${PIPELINE_REASON}" >> "$GITHUB_OUTPUT"

          if [ "$PIPELINE_PR" != "true" ]; then
            echo "pipeline_pr=false" >> "$GITHUB_OUTPUT"
            echo "auto_merge_allowed=false" >> "$GITHUB_OUTPUT"
            echo "auto_follow_up_allowed=true" >> "$GITHUB_OUTPUT"
            echo "Skipping autonomous merge for PR classification: ${PIPELINE_REASON}"
            exit 0
          fi

          mapfile -t CHANGED_FILES < <(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" --paginate --jq '.[].filename')

          for FILE in "${CHANGED_FILES[@]}"; do
            [ -n "$FILE" ] || continue

            for ACTION in policy_artifact_change workflow_file_change deploy_policy_change sensitive_app_change; do
              MATCH_JSON=$(bash scripts/check-autonomy-policy.sh match "$ACTION" "$FILE" autonomy-policy.yml)
              MATCHED=$(printf '%s' "$MATCH_JSON" | jq -r '.matched')
              MODE=$(printf '%s' "$MATCH_JSON" | jq -r '.mode')

              if [ "$MATCHED" = "true" ] && [ "$MODE" = "human_required" ]; then
                BLOCKED_REASON=$(printf '%s' "$MATCH_JSON" | jq -r '.requires_human_reason')
                echo "blocked=true" >> "$GITHUB_OUTPUT"
                echo "blocked_action=${ACTION}" >> "$GITHUB_OUTPUT"
                echo "blocked_file=${FILE}" >> "$GITHUB_OUTPUT"
                echo "blocked_reason=${BLOCKED_REASON}" >> "$GITHUB_OUTPUT"
                echo "auto_merge_allowed=false" >> "$GITHUB_OUTPUT"
                echo "auto_follow_up_allowed=false" >> "$GITHUB_OUTPUT"
                echo "Autonomous merge blocked by ${ACTION} on ${FILE}"
                exit 0
              fi
            done
          done

          echo "auto_merge_allowed=true" >> "$GITHUB_OUTPUT"
          echo "auto_follow_up_allowed=true" >> "$GITHUB_OUTPUT"

      - name: Comment autonomy policy block on PR
        if: steps.policy.outputs.blocked == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          BLOCKED_ACTION: ${{ steps.policy.outputs.blocked_action }}
          BLOCKED_FILE: ${{ steps.policy.outputs.blocked_file }}
          BLOCKED_REASON: ${{ steps.policy.outputs.blocked_reason }}
        run: |
          if [ "$BLOCKED_ACTION" = "sensitive_app_change" ]; then
            BODY="## Sensitive Path Gate"
            BODY="${BODY}"$'\n\n'"Autonomous merge blocked. This PR modifies a sensitive path:"
            BODY="${BODY}"$'\n\n'"- **File**: \`${BLOCKED_FILE}\`"
            BODY="${BODY}"$'\n'"- **Policy**: \`${BLOCKED_ACTION}\`"
            BODY="${BODY}"$'\n'"- **Reason**: ${BLOCKED_REASON}"
            BODY="${BODY}"$'\n\n'"To approve, a maintainer with write access must comment \`/approve-sensitive\` on this PR."
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              "Autonomous merge blocked by autonomy policy. File \`${BLOCKED_FILE}\` matched \`${BLOCKED_ACTION}\`. ${BLOCKED_REASON} Human review and manual merge are required for this PR."
          fi

      - name: Set sensitive-review pending status
        if: steps.policy.outputs.blocked == 'true' && steps.policy.outputs.blocked_action == 'sensitive_app_change'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.idempotency.outputs.head_sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh api --method POST "/repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state="pending" \
            -f context="sensitive-review" \
            -f description="Sensitive path change — awaiting /approve-sensitive from a maintainer"
          echo "Set sensitive-review pending status on ${HEAD_SHA}"

      - name: Enable auto-merge (APPROVE only)
        if: steps.idempotency.outputs.skip != 'true' && steps.review.outputs.verdict == 'APPROVE' && steps.healing.outputs.enabled == 'true' && steps.policy.outputs.auto_merge_allowed == 'true' && vars.PIPELINE_MVP_MODE != 'true'
        env:
          MERGE_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$MERGE_TOKEN" ]; then
            echo "::error::GH_AW_GITHUB_TOKEN is required for pipeline auto-merge so downstream push workflows can run."
            exit 1
          fi
          GH_TOKEN="$MERGE_TOKEN" gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash || echo "::warning::Could not enable auto-merge"
          echo "PR #${PR_NUMBER} approved and auto-merge enabled."

      - name: Record auto-merge evidence (APPROVE only)
        if: steps.idempotency.outputs.skip != 'true' && steps.review.outputs.verdict == 'APPROVE' && steps.healing.outputs.enabled == 'true' && steps.policy.outputs.auto_merge_allowed == 'true' && vars.PIPELINE_MVP_MODE != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.idempotency.outputs.head_sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$HEAD_SHA" ]; then
            echo "::warning::HEAD_SHA unavailable — cannot record auto-merge evidence."
            exit 0
          fi
          gh api --method POST "/repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state="success" \
            -f context="auto-merge-armed" \
            -f description="Auto-merge enabled by PR Review Submit"
          echo "Recorded auto-merge evidence on ${HEAD_SHA}"

      - name: MVP fast-track merge (pipeline PRs regardless of verdict)
        if: steps.idempotency.outputs.skip != 'true' && steps.healing.outputs.enabled == 'true' && vars.PIPELINE_MVP_MODE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIMARY_MERGE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FALLBACK_MERGE_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          merge_with_token() {
            local token=$1
            local label=$2
            local attempts=$3
            local attempt
            [ -z "$token" ] && return 1
            for attempt in $(seq 1 "$attempts"); do
              if GH_TOKEN="$token" gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --admin --delete-branch; then
                return 0
              fi
              echo "::warning::${label} merge attempt ${attempt}/${attempts} failed for PR #${PR_NUMBER}."
              if [ "$attempt" -lt "$attempts" ]; then
                sleep 5
              fi
            done
            return 1
          }

          if [ -z "$PRIMARY_MERGE_TOKEN" ] && [ -z "$FALLBACK_MERGE_TOKEN" ]; then
            echo "::error::A merge token is required for MVP fast-track merge."
            exit 1
          fi

          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title,state,isDraft,headRefName,baseRefName,author)
          PIPELINE_PR=$(printf '%s' "$PR_JSON" | bash scripts/classify-pipeline-pr.sh | jq -r '.pipeline_pr')
          if [ "$PIPELINE_PR" != "true" ]; then
            echo "PR #${PR_NUMBER} is not a pipeline PR. Skipping MVP fast-track merge."
            exit 0
          fi

          PR_STATE=$(printf '%s' "$PR_JSON" | jq -r '.state')
          if [ "$PR_STATE" = "MERGED" ] || [ "$PR_STATE" = "CLOSED" ]; then
            echo "PR #${PR_NUMBER} is already ${PR_STATE}. Skipping MVP fast-track merge."
            exit 0
          fi

          PR_DRAFT=$(printf '%s' "$PR_JSON" | jq -r '.isDraft')
          if [ "$PR_DRAFT" = "true" ]; then
            gh pr ready "$PR_NUMBER" --repo "$REPO" || echo "::warning::Could not mark PR as ready before MVP fast-track merge"
          fi

          if ! merge_with_token "$PRIMARY_MERGE_TOKEN" "primary" 2; then
            echo "::warning::Primary merge token failed for PR #${PR_NUMBER}; retrying with fallback token."
            merge_with_token "$FALLBACK_MERGE_TOKEN" "fallback" 1
          fi
          echo "PR #${PR_NUMBER} merged via MVP fast-track mode."

      - name: Close linked issues after merge (APPROVE or MVP mode)
        if: steps.idempotency.outputs.skip != 'true' && (steps.review.outputs.verdict == 'APPROVE' || vars.PIPELINE_MVP_MODE == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          ISSUE_NUMBER: ${{ steps.review.outputs.issue_number }}
          PIPELINE_PR: ${{ steps.policy.outputs.pipeline_pr }}
          POLICY_BLOCKED: ${{ steps.policy.outputs.blocked }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$PIPELINE_PR" = "true" ] && [ "$POLICY_BLOCKED" = "true" ]; then
            echo "Pipeline PR is policy-blocked and was not auto-merged. Skipping merge observation."
            exit 0
          fi

          # Poll for merge completion and close linked issues as a deterministic
          # backstop. The merge itself uses GH_AW_GITHUB_TOKEN so downstream
          # push/merge workflows can still fire normally.
          # Poll for merge completion (auto-merge typically completes within seconds).
          MERGED=false
          for i in $(seq 1 24); do
            sleep 5
            STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')
            if [ "$STATE" = "MERGED" ]; then
              MERGED=true
              break
            fi
            echo "PR #${PR_NUMBER} state: ${STATE} (attempt $i/24)"
          done

          if [ "$MERGED" = "true" ]; then
            echo "PR #${PR_NUMBER} merged. Closing linked issues."
            if [ -n "${ISSUE_NUMBER:-}" ]; then
              ISSUE_STATE=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
              if [ "$ISSUE_STATE" = "OPEN" ]; then
                gh issue close "$ISSUE_NUMBER" --repo "$REPO" \
                  -c "Closed by merge of PR #${PR_NUMBER}." || \
                  echo "::warning::Could not close issue #${ISSUE_NUMBER}"
              else
                echo "Issue #${ISSUE_NUMBER} already ${ISSUE_STATE}"
              fi
            else
              echo "No linked issue found — skipping issue close"
            fi
          else
            echo "::warning::Merge not observed within 120s for PR #${PR_NUMBER}."
            if [ -n "${ISSUE_NUMBER:-}" ]; then
              ISSUE_STATE=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
              if [ "$ISSUE_STATE" = "OPEN" ]; then
                gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
                  --body "Merge not observed within 120s for PR #${PR_NUMBER}. Issue closure deferred to watchdog." || true
              fi
            fi
          fi

      - name: Close superseded duplicate PRs
        if: steps.idempotency.outputs.skip != 'true' && (steps.review.outputs.verdict == 'APPROVE' || vars.PIPELINE_MVP_MODE == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          ISSUE_NUMBER: ${{ steps.review.outputs.issue_number }}
          PIPELINE_PR: ${{ steps.policy.outputs.pipeline_pr }}
          POLICY_BLOCKED: ${{ steps.policy.outputs.blocked }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$PIPELINE_PR" = "true" ] && [ "$POLICY_BLOCKED" = "true" ]; then
            echo "Pipeline PR is policy-blocked and was not auto-merged. Skipping superseded PR cleanup."
            exit 0
          fi

          if [ -z "${ISSUE_NUMBER:-}" ]; then
            echo "No linked issue — skipping superseded PR check"
            exit 0
          fi

          # Check if this PR actually merged
          STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')
          if [ "$STATE" != "MERGED" ]; then
            echo "PR #${PR_NUMBER} not merged — skipping superseded PR cleanup"
            exit 0
          fi

          DUPES=$(
            gh pr list --repo "$REPO" --state open --json number,title,body,headRefName,baseRefName,author \
              | jq -rc '.[]' \
              | while read -r pr; do
                  CANDIDATE_NUMBER=$(printf '%s' "$pr" | jq -r '.number')
                  if [ "$CANDIDATE_NUMBER" = "$PR_NUMBER" ]; then
                    continue
                  fi
                  if ! printf '%s' "$pr" | bash scripts/classify-pipeline-pr.sh | jq -e '.pipeline_pr == true' >/dev/null; then
                    continue
                  fi
                  CANDIDATE_BODY=$(printf '%s' "$pr" | jq -r '.body // ""')
                  if printf '%s' "$CANDIDATE_BODY" | bash scripts/extract-linked-issue-numbers.sh "$REPO" | grep -qx "$ISSUE_NUMBER"; then
                    echo "$CANDIDATE_NUMBER"
                  fi
                done
          )

          if [ -z "$DUPES" ]; then
            echo "No superseded PRs found for issue #${ISSUE_NUMBER}"
            exit 0
          fi

          for DUP in $DUPES; do
            echo "Closing superseded PR #${DUP}"
            gh pr close "$DUP" --repo "$REPO" --delete-branch \
              -c "Superseded by PR #${PR_NUMBER} which merged and closed issue #${ISSUE_NUMBER}." || \
              echo "::warning::Could not close PR #${DUP}"
          done

      - name: Dispatch requeue after MVP merge
        if: steps.idempotency.outputs.skip != 'true' && steps.healing.outputs.enabled == 'true' && vars.PIPELINE_MVP_MODE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIMARY_DISPATCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FALLBACK_DISPATCH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          PIPELINE_PR: ${{ steps.policy.outputs.pipeline_pr }}
          REPO: ${{ github.repository }}
        run: |
          dispatch_and_confirm() {
            local token=$1
            local label=$2
            local attempts=$3
            local attempt
            local poll
            local before
            local dispatch_output
            local run_url
            local run_id

            [ -z "$token" ] && return 1

            for attempt in $(seq 1 "$attempts"); do
              before=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

              if ! dispatch_output=$(GH_TOKEN="$token" gh workflow run auto-dispatch-requeue.yml --repo "$REPO" 2>&1); then
                echo "::warning::${label} dispatch attempt ${attempt}/${attempts} failed for auto-dispatch-requeue."
                printf '%s\n' "$dispatch_output"
                continue
              fi

              printf '%s\n' "$dispatch_output"
              run_url=$(printf '%s\n' "$dispatch_output" | grep -Eo 'https://github\.com/[^[:space:]]+/actions/runs/[0-9]+' | tail -1 || true)
              run_id=""
              if [ -n "$run_url" ]; then
                run_id="${run_url##*/}"
              fi

              for poll in $(seq 1 12); do
                sleep 5
                if [ -n "$run_id" ]; then
                  if GH_TOKEN="$token" gh run view "$run_id" --repo "$REPO" --json databaseId --jq '.databaseId' >/dev/null 2>&1; then
                    echo "Confirmed auto-dispatch-requeue run ${run_id} after ${label} dispatch."
                    return 0
                  fi
                else
                  run_id=$(
                    GH_TOKEN="$token" gh api "/repos/${REPO}/actions/workflows/auto-dispatch-requeue.yml/runs?event=workflow_dispatch&per_page=20" \
                      --jq --arg since "$before" '
                        .workflow_runs
                        | map(select(.created_at >= $since))
                        | sort_by(.created_at)
                        | reverse
                        | .[0].id // empty
                      ' 2>/dev/null || true
                  )
                fi
                if [ -n "$run_id" ] && GH_TOKEN="$token" gh run view "$run_id" --repo "$REPO" --json databaseId --jq '.databaseId' >/dev/null 2>&1; then
                  echo "Confirmed auto-dispatch-requeue run ${run_id} after ${label} dispatch."
                  return 0
                fi
              done

              echo "::warning::${label} dispatch attempt ${attempt}/${attempts} did not create a detectable auto-dispatch-requeue run."
            done

            return 1
          }

          EFFECTIVE_PIPELINE_PR="${PIPELINE_PR:-}"
          if [ -z "$EFFECTIVE_PIPELINE_PR" ]; then
            PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title,headRefName,baseRefName,author)
            EFFECTIVE_PIPELINE_PR=$(printf '%s' "$PR_JSON" | bash scripts/classify-pipeline-pr.sh | jq -r '.pipeline_pr')
          fi

          if [ "$EFFECTIVE_PIPELINE_PR" != "true" ]; then
            echo "PR #${PR_NUMBER} is not a pipeline PR. Skipping requeue dispatch."
            exit 0
          fi

          STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')
          if [ "$STATE" != "MERGED" ]; then
            echo "PR #${PR_NUMBER} not merged — skipping requeue dispatch."
            exit 0
          fi

          if [ -z "$PRIMARY_DISPATCH_TOKEN" ] && [ -z "$FALLBACK_DISPATCH_TOKEN" ]; then
            echo "::error::A dispatch token is required to trigger auto-dispatch-requeue after MVP merge."
            exit 1
          fi

          if ! dispatch_and_confirm "$PRIMARY_DISPATCH_TOKEN" "primary" 2; then
            echo "::warning::Primary dispatch token did not produce a verified requeue run for PR #${PR_NUMBER}; retrying with fallback token."
            if ! dispatch_and_confirm "$FALLBACK_DISPATCH_TOKEN" "fallback" 1; then
              echo "::error::Dispatch requeue after MVP merge reported success path but no auto-dispatch-requeue run was created for PR #${PR_NUMBER}."
              exit 1
            fi
          fi

          echo "Dispatched and verified auto-dispatch-requeue after MVP merge of PR #${PR_NUMBER}."

      - name: Dispatch owning agent for next cycle
        if: always() && steps.idempotency.outputs.skip != 'true' && steps.review.outputs.verdict != '' && steps.healing.outputs.enabled == 'true' && vars.PIPELINE_MVP_MODE != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_VERDICT: ${{ steps.review.outputs.verdict }}
          REVIEW_SUMMARY: ${{ steps.review.outputs.summary }}
          PR_NUMBER: ${{ github.event.issue.number }}
          ISSUE_NUMBER: ${{ steps.review.outputs.issue_number }}
          PIPELINE_PR: ${{ steps.policy.outputs.pipeline_pr }}
          POLICY_BLOCKED: ${{ steps.policy.outputs.blocked }}
          AUTO_FOLLOW_UP_ALLOWED: ${{ steps.policy.outputs.auto_follow_up_allowed }}
          REPO: ${{ github.repository }}
        run: |
          VERDICT="$REVIEW_VERDICT"
          SUMMARY="$REVIEW_SUMMARY"

          # Determine owning agent from PR labels
          PR_LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name]' 2>/dev/null || echo '[]')
          if printf '%s' "$PR_LABELS" | jq -e 'index("frontend")' >/dev/null 2>&1; then
            AGENT_WORKFLOW="frontend-agent.lock.yml"
            AGENT_COMMAND="/frontend-agent"
          else
            AGENT_WORKFLOW="repo-assist.lock.yml"
            AGENT_COMMAND="/repo-assist"
          fi

          OPEN_ISSUES=$(gh issue list --repo "$REPO" \
            --label pipeline --state open --json number,title,labels \
            --jq '[.[] | select(
              .title != "[Pipeline] Status" and
              ([.labels[]?.name] | any(. == "feature" or . == "infra" or . == "bug" or . == "docs" or . == "test"))
            )] | length')
          OPEN_PRS=$(
            gh pr list --repo "$REPO" --state open --json number,title,headRefName,baseRefName,author \
              | jq -rc '.[]' \
              | while read -r pr; do
                  if printf '%s' "$pr" | bash scripts/classify-pipeline-pr.sh | jq -e '.pipeline_pr == true' >/dev/null; then
                    echo 1
                  fi
                done \
              | wc -l \
              | tr -d '[:space:]'
          )
          TOTAL=$((OPEN_ISSUES + OPEN_PRS))

          if [ "$TOTAL" -eq 0 ]; then
            echo "No open pipeline issues or PRs remaining. Pipeline complete!"
            exit 0
          fi

          echo "Review verdict: $VERDICT. Found $TOTAL open pipeline items. Owning agent: ${AGENT_COMMAND}"

          if [ "$VERDICT" = "APPROVE" ]; then
            if [ "$PIPELINE_PR" = "true" ] && [ "$POLICY_BLOCKED" = "true" ] && [ "$AUTO_FOLLOW_UP_ALLOWED" != "true" ]; then
              echo "Pipeline PR is policy-blocked. Skipping autonomous follow-up dispatch."
              exit 0
            fi

            # APPROVE path: dispatch owning agent in scheduled mode for next issue
            gh workflow run "$AGENT_WORKFLOW" --repo "$REPO" || \
              echo "::warning::Could not dispatch ${AGENT_WORKFLOW}"
          else
            # REQUEST_CHANGES path: post owning agent command on the linked issue
            TARGET_ISSUE="${ISSUE_NUMBER:-}"
            if [ -n "$TARGET_ISSUE" ]; then
              gh issue comment "$TARGET_ISSUE" --repo "$REPO" \
                --body "${AGENT_COMMAND} Fix review feedback on PR #${PR_NUMBER}. The reviewer said: ${SUMMARY}. Read the full review on PR #${PR_NUMBER}, implement all requested changes, push fixes to the PR branch, and comment what you changed." || \
                echo "::warning::Could not post ${AGENT_COMMAND} comment"
            else
              echo "::warning::No linked issue found for PR #${PR_NUMBER} — cannot post ${AGENT_COMMAND}"
            fi
          fi

  # ---------------------------------------------------------------------------
  # Job 2: workflow_dispatch trigger — break-glass manual path
  # ---------------------------------------------------------------------------
  submit-review-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch'

    concurrency:
      group: "pr-review-submit-${{ github.event.inputs.pr_number }}"
      cancel-in-progress: false

    env:
      PIPELINE_HEALING_ENABLED: ${{ vars.PIPELINE_HEALING_ENABLED }}

    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/healing-control.sh
            scripts/check-autonomy-policy.sh
            scripts/classify-pipeline-pr.sh
            scripts/extract-linked-issue-numbers.sh
            autonomy-policy.yml
          sparse-checkout-cone-mode: false

      - name: Check healing pause switch
        id: healing
        run: |
          if scripts/healing-control.sh is-enabled; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Autonomous healing is paused via PIPELINE_HEALING_ENABLED."
          fi

      - name: Resolve review actor login
        id: review-actor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          LOGIN=$(gh api user --jq '.login' 2>/dev/null || echo "github-actions[bot]")
          echo "login=${LOGIN}" >> "$GITHUB_OUTPUT"

      - name: Check idempotency (skip if same verdict already reviewed at current HEAD)
        id: idempotency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
          TARGET_VERDICT: ${{ github.event.inputs.verdict }}
          REVIEW_ACTOR_LOGIN: ${{ steps.review-actor.outputs.login }}
        run: |
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

          if [ "$TARGET_VERDICT" = "APPROVE" ]; then
            TARGET_STATE="APPROVED"
          else
            TARGET_STATE="CHANGES_REQUESTED"
          fi
          echo "target_state=${TARGET_STATE}" >> "$GITHUB_OUTPUT"

          EXISTING=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --jq "[.[] | select(.user.login == \"${REVIEW_ACTOR_LOGIN}\" and .commit_id == \"${HEAD_SHA}\" and .state == \"${TARGET_STATE}\")] | length" \
            2>/dev/null || echo "0")

          if [ "$EXISTING" -gt 0 ]; then
            echo "Already reviewed with ${TARGET_STATE} at head SHA ${HEAD_SHA}. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing ${TARGET_STATE} review at ${HEAD_SHA}. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit review from dispatch inputs
        if: steps.idempotency.outputs.skip != 'true'
        continue-on-error: ${{ vars.PIPELINE_MVP_MODE == 'true' }}
        id: review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          VERDICT: ${{ github.event.inputs.verdict }}
          SUMMARY: ${{ github.event.inputs.summary }}
          REPO: ${{ github.repository }}
        run: |
          echo "verdict=${VERDICT}" >> "$GITHUB_OUTPUT"
          echo "Submitting break-glass ${VERDICT} review on PR #${PR_NUMBER}"

          # Get PR title for [Pipeline] detection and linked issue extraction
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title --jq '.title')
          echo "pr_title=${PR_TITLE}" >> "$GITHUB_OUTPUT"

          ISSUE_NUMBER=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body // ""' \
            | bash scripts/extract-linked-issue-numbers.sh "$REPO" \
            | head -1 || true)
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

          REVIEW_BODY="## Pipeline Review — Break-glass ${VERDICT}"$'\n\n'"${SUMMARY}"$'\n\n'"---"$'\n'"*Submitted via workflow_dispatch by @${{ github.actor }}.*"

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            -f event="${VERDICT}" \
            -f body="${REVIEW_BODY}"

          echo "Submitted ${VERDICT} review on PR #${PR_NUMBER}"

      - name: Set review status check
        if: always() && steps.idempotency.outputs.head_sha != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_AW_GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.idempotency.outputs.head_sha }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
          REVIEW_ACTOR_LOGIN: ${{ steps.review-actor.outputs.login }}
        run: |
          VERDICT="${{ steps.review.outputs.verdict }}"
          if [ -z "$VERDICT" ]; then
            VERDICT=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --jq "[.[] | select(.user.login == \"${REVIEW_ACTOR_LOGIN}\")] | last | .state // \"\"" || echo "")
          fi
          if [ -z "$VERDICT" ]; then
            VERDICT="${{ github.event.inputs.verdict }}"
          fi
          if [ -z "$VERDICT" ]; then
            echo "No verdict available — skipping status check"
            exit 0
          fi
          gh api --method POST "/repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state="success" \
            -f context="review" \
            -f description="Review completed: ${VERDICT}"
          echo "Set 'review' status check to success on ${HEAD_SHA} (verdict: ${VERDICT})"

      - name: Mark draft PR ready (APPROVE or MVP mode)
        if: steps.idempotency.outputs.skip != 'true' && (github.event.inputs.verdict == 'APPROVE' || vars.PIPELINE_MVP_MODE == 'true')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          PR_DRAFT=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json isDraft -q '.isDraft')
          if [ "$PR_DRAFT" = "true" ]; then
            gh pr ready "$PR_NUMBER" --repo "$REPO" || echo "::warning::Could not mark PR as ready"
          else
            echo "PR #${PR_NUMBER} is already ready for review."
          fi

      - name: Evaluate autonomy policy for autonomous merge (APPROVE only)
        if: always() && github.event.inputs.verdict == 'APPROVE'
        id: policy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          echo "blocked=false" >> "$GITHUB_OUTPUT"
          echo "blocked_action=" >> "$GITHUB_OUTPUT"
          echo "blocked_file=" >> "$GITHUB_OUTPUT"
          echo "blocked_reason=" >> "$GITHUB_OUTPUT"

          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title,headRefName,baseRefName,author)
          PIPELINE_JSON=$(printf '%s' "$PR_JSON" | bash scripts/classify-pipeline-pr.sh)
          PIPELINE_PR=$(printf '%s' "$PIPELINE_JSON" | jq -r '.pipeline_pr')
          PIPELINE_REASON=$(printf '%s' "$PIPELINE_JSON" | jq -r '.reason')

          echo "pipeline_pr=${PIPELINE_PR}" >> "$GITHUB_OUTPUT"
          echo "pipeline_reason=${PIPELINE_REASON}" >> "$GITHUB_OUTPUT"

          if [ "$PIPELINE_PR" != "true" ]; then
            echo "pipeline_pr=false" >> "$GITHUB_OUTPUT"
            echo "auto_merge_allowed=false" >> "$GITHUB_OUTPUT"
            echo "auto_follow_up_allowed=true" >> "$GITHUB_OUTPUT"
            echo "Skipping autonomous merge for PR classification: ${PIPELINE_REASON}"
            exit 0
          fi

          mapfile -t CHANGED_FILES < <(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" --paginate --jq '.[].filename')

          for FILE in "${CHANGED_FILES[@]}"; do
            [ -n "$FILE" ] || continue

            for ACTION in policy_artifact_change workflow_file_change deploy_policy_change sensitive_app_change; do
              MATCH_JSON=$(bash scripts/check-autonomy-policy.sh match "$ACTION" "$FILE" autonomy-policy.yml)
              MATCHED=$(printf '%s' "$MATCH_JSON" | jq -r '.matched')
              MODE=$(printf '%s' "$MATCH_JSON" | jq -r '.mode')

              if [ "$MATCHED" = "true" ] && [ "$MODE" = "human_required" ]; then
                BLOCKED_REASON=$(printf '%s' "$MATCH_JSON" | jq -r '.requires_human_reason')
                echo "blocked=true" >> "$GITHUB_OUTPUT"
                echo "blocked_action=${ACTION}" >> "$GITHUB_OUTPUT"
                echo "blocked_file=${FILE}" >> "$GITHUB_OUTPUT"
                echo "blocked_reason=${BLOCKED_REASON}" >> "$GITHUB_OUTPUT"
                echo "auto_merge_allowed=false" >> "$GITHUB_OUTPUT"
                echo "auto_follow_up_allowed=false" >> "$GITHUB_OUTPUT"
                echo "Autonomous merge blocked by ${ACTION} on ${FILE}"
                exit 0
              fi
            done
          done

          echo "auto_merge_allowed=true" >> "$GITHUB_OUTPUT"
          echo "auto_follow_up_allowed=true" >> "$GITHUB_OUTPUT"

      - name: Comment autonomy policy block on PR
        if: steps.policy.outputs.blocked == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
          BLOCKED_ACTION: ${{ steps.policy.outputs.blocked_action }}
          BLOCKED_FILE: ${{ steps.policy.outputs.blocked_file }}
          BLOCKED_REASON: ${{ steps.policy.outputs.blocked_reason }}
        run: |
          if [ "$BLOCKED_ACTION" = "sensitive_app_change" ]; then
            BODY="## Sensitive Path Gate"
            BODY="${BODY}"$'\n\n'"Autonomous merge blocked. This PR modifies a sensitive path:"
            BODY="${BODY}"$'\n\n'"- **File**: \`${BLOCKED_FILE}\`"
            BODY="${BODY}"$'\n'"- **Policy**: \`${BLOCKED_ACTION}\`"
            BODY="${BODY}"$'\n'"- **Reason**: ${BLOCKED_REASON}"
            BODY="${BODY}"$'\n\n'"To approve, a maintainer with write access must comment \`/approve-sensitive\` on this PR."
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              "Autonomous merge blocked by autonomy policy. File \`${BLOCKED_FILE}\` matched \`${BLOCKED_ACTION}\`. ${BLOCKED_REASON} Human review and manual merge are required for this PR."
          fi

      - name: Set sensitive-review pending status
        if: steps.policy.outputs.blocked == 'true' && steps.policy.outputs.blocked_action == 'sensitive_app_change'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.idempotency.outputs.head_sha }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          gh api --method POST "/repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state="pending" \
            -f context="sensitive-review" \
            -f description="Sensitive path change — awaiting /approve-sensitive from a maintainer"
          echo "Set sensitive-review pending status on ${HEAD_SHA}"

      - name: Enable auto-merge (APPROVE only)
        if: steps.idempotency.outputs.skip != 'true' && github.event.inputs.verdict == 'APPROVE' && steps.healing.outputs.enabled == 'true' && steps.policy.outputs.auto_merge_allowed == 'true' && vars.PIPELINE_MVP_MODE != 'true'
        env:
          MERGE_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$MERGE_TOKEN" ]; then
            echo "::error::GH_AW_GITHUB_TOKEN is required for pipeline auto-merge so downstream push workflows can run."
            exit 1
          fi
          GH_TOKEN="$MERGE_TOKEN" gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash || echo "::warning::Could not enable auto-merge"
          echo "PR #${PR_NUMBER} approved and auto-merge enabled."

      - name: Record auto-merge evidence (APPROVE only)
        if: steps.idempotency.outputs.skip != 'true' && github.event.inputs.verdict == 'APPROVE' && steps.healing.outputs.enabled == 'true' && steps.policy.outputs.auto_merge_allowed == 'true' && vars.PIPELINE_MVP_MODE != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.idempotency.outputs.head_sha }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$HEAD_SHA" ]; then
            echo "::warning::HEAD_SHA unavailable — cannot record auto-merge evidence."
            exit 0
          fi
          gh api --method POST "/repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state="success" \
            -f context="auto-merge-armed" \
            -f description="Auto-merge enabled by PR Review Submit"
          echo "Recorded auto-merge evidence on ${HEAD_SHA}"

      - name: MVP fast-track merge (pipeline PRs regardless of verdict)
        if: steps.idempotency.outputs.skip != 'true' && steps.healing.outputs.enabled == 'true' && vars.PIPELINE_MVP_MODE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIMARY_MERGE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FALLBACK_MERGE_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          merge_with_token() {
            local token=$1
            local label=$2
            local attempts=$3
            local attempt
            [ -z "$token" ] && return 1
            for attempt in $(seq 1 "$attempts"); do
              if GH_TOKEN="$token" gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --admin --delete-branch; then
                return 0
              fi
              echo "::warning::${label} merge attempt ${attempt}/${attempts} failed for PR #${PR_NUMBER}."
              if [ "$attempt" -lt "$attempts" ]; then
                sleep 5
              fi
            done
            return 1
          }

          if [ -z "$PRIMARY_MERGE_TOKEN" ] && [ -z "$FALLBACK_MERGE_TOKEN" ]; then
            echo "::error::A merge token is required for MVP fast-track merge."
            exit 1
          fi

          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title,state,isDraft,headRefName,baseRefName,author)
          PIPELINE_PR=$(printf '%s' "$PR_JSON" | bash scripts/classify-pipeline-pr.sh | jq -r '.pipeline_pr')
          if [ "$PIPELINE_PR" != "true" ]; then
            echo "PR #${PR_NUMBER} is not a pipeline PR. Skipping MVP fast-track merge."
            exit 0
          fi

          PR_STATE=$(printf '%s' "$PR_JSON" | jq -r '.state')
          if [ "$PR_STATE" = "MERGED" ] || [ "$PR_STATE" = "CLOSED" ]; then
            echo "PR #${PR_NUMBER} is already ${PR_STATE}. Skipping MVP fast-track merge."
            exit 0
          fi

          PR_DRAFT=$(printf '%s' "$PR_JSON" | jq -r '.isDraft')
          if [ "$PR_DRAFT" = "true" ]; then
            gh pr ready "$PR_NUMBER" --repo "$REPO" || echo "::warning::Could not mark PR as ready before MVP fast-track merge"
          fi

          if ! merge_with_token "$PRIMARY_MERGE_TOKEN" "primary" 2; then
            echo "::warning::Primary merge token failed for PR #${PR_NUMBER}; retrying with fallback token."
            merge_with_token "$FALLBACK_MERGE_TOKEN" "fallback" 1
          fi
          echo "PR #${PR_NUMBER} merged via MVP fast-track mode."

      - name: Close linked issues after merge (APPROVE or MVP mode)
        if: steps.idempotency.outputs.skip != 'true' && (github.event.inputs.verdict == 'APPROVE' || vars.PIPELINE_MVP_MODE == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.review.outputs.issue_number }}
          PIPELINE_PR: ${{ steps.policy.outputs.pipeline_pr }}
          POLICY_BLOCKED: ${{ steps.policy.outputs.blocked }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$PIPELINE_PR" = "true" ] && [ "$POLICY_BLOCKED" = "true" ]; then
            echo "Pipeline PR is policy-blocked and was not auto-merged. Skipping merge observation."
            exit 0
          fi

          MERGED=false
          for i in $(seq 1 24); do
            sleep 5
            STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')
            if [ "$STATE" = "MERGED" ]; then
              MERGED=true
              break
            fi
            echo "PR #${PR_NUMBER} state: ${STATE} (attempt $i/24)"
          done

          if [ "$MERGED" = "true" ]; then
            echo "PR #${PR_NUMBER} merged. Closing linked issues."
            TARGET="${ISSUE_NUMBER:-}"
            if [ -z "$TARGET" ]; then
              TARGET=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body // ""' \
                | bash scripts/extract-linked-issue-numbers.sh "$REPO" \
                | head -1 || true)
            fi
            if [ -n "$TARGET" ]; then
              ISSUE_STATE=$(gh issue view "$TARGET" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
              if [ "$ISSUE_STATE" = "OPEN" ]; then
                gh issue close "$TARGET" --repo "$REPO" \
                  -c "Closed by merge of PR #${PR_NUMBER}." || \
                  echo "::warning::Could not close issue #${TARGET}"
              else
                echo "Issue #${TARGET} already ${ISSUE_STATE}"
              fi
            else
              echo "No linked issue found — skipping issue close"
            fi
          else
            echo "::warning::Merge not observed within 120s for PR #${PR_NUMBER}."
            TARGET="${ISSUE_NUMBER:-}"
            if [ -z "$TARGET" ]; then
              TARGET=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body // ""' \
                | bash scripts/extract-linked-issue-numbers.sh "$REPO" \
                | head -1 || true)
            fi
            if [ -n "$TARGET" ]; then
              ISSUE_STATE=$(gh issue view "$TARGET" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
              if [ "$ISSUE_STATE" = "OPEN" ]; then
                gh issue comment "$TARGET" --repo "$REPO" \
                  --body "Merge not observed within 120s for PR #${PR_NUMBER}. Issue closure deferred to watchdog." || true
              fi
            fi
          fi

      - name: Close superseded duplicate PRs
        if: steps.idempotency.outputs.skip != 'true' && (github.event.inputs.verdict == 'APPROVE' || vars.PIPELINE_MVP_MODE == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.review.outputs.issue_number }}
          PIPELINE_PR: ${{ steps.policy.outputs.pipeline_pr }}
          POLICY_BLOCKED: ${{ steps.policy.outputs.blocked }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$PIPELINE_PR" = "true" ] && [ "$POLICY_BLOCKED" = "true" ]; then
            echo "Pipeline PR is policy-blocked and was not auto-merged. Skipping superseded PR cleanup."
            exit 0
          fi

          TARGET="${ISSUE_NUMBER:-}"
          if [ -z "$TARGET" ]; then
            TARGET=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body // ""' \
              | bash scripts/extract-linked-issue-numbers.sh "$REPO" \
              | head -1 || true)
          fi
          if [ -z "$TARGET" ]; then
            echo "No linked issue — skipping superseded PR check"
            exit 0
          fi

          STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')
          if [ "$STATE" != "MERGED" ]; then
            echo "PR #${PR_NUMBER} not merged — skipping superseded PR cleanup"
            exit 0
          fi

          DUPES=$(
            gh pr list --repo "$REPO" --state open --json number,title,body,headRefName,baseRefName,author \
              | jq -rc '.[]' \
              | while read -r pr; do
                  CANDIDATE_NUMBER=$(printf '%s' "$pr" | jq -r '.number')
                  if [ "$CANDIDATE_NUMBER" = "$PR_NUMBER" ]; then
                    continue
                  fi
                  if ! printf '%s' "$pr" | bash scripts/classify-pipeline-pr.sh | jq -e '.pipeline_pr == true' >/dev/null; then
                    continue
                  fi
                  CANDIDATE_BODY=$(printf '%s' "$pr" | jq -r '.body // ""')
                  if printf '%s' "$CANDIDATE_BODY" | bash scripts/extract-linked-issue-numbers.sh "$REPO" | grep -qx "$TARGET"; then
                    echo "$CANDIDATE_NUMBER"
                  fi
                done
          )

          if [ -z "$DUPES" ]; then
            echo "No superseded PRs found for issue #${TARGET}"
            exit 0
          fi

          for DUP in $DUPES; do
            echo "Closing superseded PR #${DUP}"
            gh pr close "$DUP" --repo "$REPO" --delete-branch \
              -c "Superseded by PR #${PR_NUMBER} which merged and closed issue #${TARGET}." || \
              echo "::warning::Could not close PR #${DUP}"
          done

      - name: Dispatch requeue after MVP merge
        if: steps.idempotency.outputs.skip != 'true' && steps.healing.outputs.enabled == 'true' && vars.PIPELINE_MVP_MODE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIMARY_DISPATCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FALLBACK_DISPATCH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          PIPELINE_PR: ${{ steps.policy.outputs.pipeline_pr }}
          REPO: ${{ github.repository }}
        run: |
          dispatch_and_confirm() {
            local token=$1
            local label=$2
            local attempts=$3
            local attempt
            local poll
            local before
            local dispatch_output
            local run_url
            local run_id

            [ -z "$token" ] && return 1

            for attempt in $(seq 1 "$attempts"); do
              before=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

              if ! dispatch_output=$(GH_TOKEN="$token" gh workflow run auto-dispatch-requeue.yml --repo "$REPO" 2>&1); then
                echo "::warning::${label} dispatch attempt ${attempt}/${attempts} failed for auto-dispatch-requeue."
                printf '%s\n' "$dispatch_output"
                continue
              fi

              printf '%s\n' "$dispatch_output"
              run_url=$(printf '%s\n' "$dispatch_output" | grep -Eo 'https://github\.com/[^[:space:]]+/actions/runs/[0-9]+' | tail -1 || true)
              run_id=""
              if [ -n "$run_url" ]; then
                run_id="${run_url##*/}"
              fi

              for poll in $(seq 1 12); do
                sleep 5
                if [ -n "$run_id" ]; then
                  if GH_TOKEN="$token" gh run view "$run_id" --repo "$REPO" --json databaseId --jq '.databaseId' >/dev/null 2>&1; then
                    echo "Confirmed auto-dispatch-requeue run ${run_id} after ${label} dispatch."
                    return 0
                  fi
                else
                  run_id=$(
                    GH_TOKEN="$token" gh api "/repos/${REPO}/actions/workflows/auto-dispatch-requeue.yml/runs?event=workflow_dispatch&per_page=20" \
                      --jq --arg since "$before" '
                        .workflow_runs
                        | map(select(.created_at >= $since))
                        | sort_by(.created_at)
                        | reverse
                        | .[0].id // empty
                      ' 2>/dev/null || true
                  )
                fi
                if [ -n "$run_id" ] && GH_TOKEN="$token" gh run view "$run_id" --repo "$REPO" --json databaseId --jq '.databaseId' >/dev/null 2>&1; then
                  echo "Confirmed auto-dispatch-requeue run ${run_id} after ${label} dispatch."
                  return 0
                fi
              done

              echo "::warning::${label} dispatch attempt ${attempt}/${attempts} did not create a detectable auto-dispatch-requeue run."
            done

            return 1
          }

          EFFECTIVE_PIPELINE_PR="${PIPELINE_PR:-}"
          if [ -z "$EFFECTIVE_PIPELINE_PR" ]; then
            PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title,headRefName,baseRefName,author)
            EFFECTIVE_PIPELINE_PR=$(printf '%s' "$PR_JSON" | bash scripts/classify-pipeline-pr.sh | jq -r '.pipeline_pr')
          fi

          if [ "$EFFECTIVE_PIPELINE_PR" != "true" ]; then
            echo "PR #${PR_NUMBER} is not a pipeline PR. Skipping requeue dispatch."
            exit 0
          fi

          STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state')
          if [ "$STATE" != "MERGED" ]; then
            echo "PR #${PR_NUMBER} not merged — skipping requeue dispatch."
            exit 0
          fi

          if [ -z "$PRIMARY_DISPATCH_TOKEN" ] && [ -z "$FALLBACK_DISPATCH_TOKEN" ]; then
            echo "::error::A dispatch token is required to trigger auto-dispatch-requeue after MVP merge."
            exit 1
          fi

          if ! dispatch_and_confirm "$PRIMARY_DISPATCH_TOKEN" "primary" 2; then
            echo "::warning::Primary dispatch token did not produce a verified requeue run for PR #${PR_NUMBER}; retrying with fallback token."
            if ! dispatch_and_confirm "$FALLBACK_DISPATCH_TOKEN" "fallback" 1; then
              echo "::error::Dispatch requeue after MVP merge reported success path but no auto-dispatch-requeue run was created for PR #${PR_NUMBER}."
              exit 1
            fi
          fi

          echo "Dispatched and verified auto-dispatch-requeue after MVP merge of PR #${PR_NUMBER}."

      - name: Dispatch owning agent for next cycle
        if: always() && steps.healing.outputs.enabled == 'true' && vars.PIPELINE_MVP_MODE != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_VERDICT: ${{ steps.review.outputs.verdict }}
          INPUT_VERDICT: ${{ github.event.inputs.verdict }}
          REVIEW_SUMMARY: ${{ github.event.inputs.summary }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.review.outputs.issue_number }}
          PIPELINE_PR: ${{ steps.policy.outputs.pipeline_pr }}
          POLICY_BLOCKED: ${{ steps.policy.outputs.blocked }}
          AUTO_FOLLOW_UP_ALLOWED: ${{ steps.policy.outputs.auto_follow_up_allowed }}
          REPO: ${{ github.repository }}
        run: |
          VERDICT="${REVIEW_VERDICT:-$INPUT_VERDICT}"
          SUMMARY="$REVIEW_SUMMARY"

          # Determine owning agent from PR labels
          PR_LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name]' 2>/dev/null || echo '[]')
          if printf '%s' "$PR_LABELS" | jq -e 'index("frontend")' >/dev/null 2>&1; then
            AGENT_WORKFLOW="frontend-agent.lock.yml"
            AGENT_COMMAND="/frontend-agent"
          else
            AGENT_WORKFLOW="repo-assist.lock.yml"
            AGENT_COMMAND="/repo-assist"
          fi

          OPEN_ISSUES=$(gh issue list --repo "$REPO" \
            --label pipeline --state open --json number,title,labels \
            --jq '[.[] | select(
              .title != "[Pipeline] Status" and
              ([.labels[]?.name] | any(. == "feature" or . == "infra" or . == "bug" or . == "docs" or . == "test"))
            )] | length')
          OPEN_PRS=$(
            gh pr list --repo "$REPO" --state open --json number,title,headRefName,baseRefName,author \
              | jq -rc '.[]' \
              | while read -r pr; do
                  if printf '%s' "$pr" | bash scripts/classify-pipeline-pr.sh | jq -e '.pipeline_pr == true' >/dev/null; then
                    echo 1
                  fi
                done \
              | wc -l \
              | tr -d '[:space:]'
          )
          TOTAL=$((OPEN_ISSUES + OPEN_PRS))

          if [ "$TOTAL" -eq 0 ]; then
            echo "No open pipeline issues or PRs remaining. Pipeline complete!"
            exit 0
          fi

          echo "Review verdict: $VERDICT. Found $TOTAL open pipeline items. Owning agent: ${AGENT_COMMAND}"

          if [ "$VERDICT" = "APPROVE" ]; then
            if [ "$PIPELINE_PR" = "true" ] && [ "$POLICY_BLOCKED" = "true" ] && [ "$AUTO_FOLLOW_UP_ALLOWED" != "true" ]; then
              echo "Pipeline PR is policy-blocked. Skipping autonomous follow-up dispatch."
              exit 0
            fi

            gh workflow run "$AGENT_WORKFLOW" --repo "$REPO" || \
              echo "::warning::Could not dispatch ${AGENT_WORKFLOW}"
          else
            TARGET_ISSUE="${ISSUE_NUMBER:-}"
            if [ -n "$TARGET_ISSUE" ]; then
              gh issue comment "$TARGET_ISSUE" --repo "$REPO" \
                --body "${AGENT_COMMAND} Fix review feedback on PR #${PR_NUMBER}. The reviewer said: ${SUMMARY}. Read the full review on PR #${PR_NUMBER}, implement all requested changes, push fixes to the PR branch, and comment what you changed." || \
                echo "::warning::Could not post ${AGENT_COMMAND} comment"
            else
              echo "::warning::No linked issue found for PR #${PR_NUMBER} — cannot post ${AGENT_COMMAND}"
            fi
          fi

      - name: Log paused autonomous follow-up skip
        if: always() && steps.healing.outputs.enabled != 'true'
        run: echo "Review completed, but autonomous follow-up is paused via PIPELINE_HEALING_ENABLED."

  # ---------------------------------------------------------------------------
  # Job 3: /approve-sensitive comment handler
  # ---------------------------------------------------------------------------
  approve-sensitive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      (startsWith(github.event.comment.body, '/approve-sensitive') || startsWith(github.event.comment.body, '/approve_sensitive'))

    concurrency:
      group: "pr-review-submit-${{ github.event.issue.number }}"
      cancel-in-progress: false

    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/check-autonomy-policy.sh
            autonomy-policy.yml
          sparse-checkout-cone-mode: false

      - name: Verify approver has write access
        id: check-access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.GH_AW_GITHUB_TOKEN }}
        run: |
          PERM=$(gh api repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission \
            --jq '.permission' 2>/dev/null || echo "none")
          if [[ "$PERM" != "admin" && "$PERM" != "write" && "$PERM" != "maintain" ]]; then
            echo "::error::User ${{ github.event.comment.user.login }} does not have write access"
            exit 1
          fi
          echo "approved_by=${{ github.event.comment.user.login }}" >> "$GITHUB_OUTPUT"

      - name: Approve sensitive path change
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          mapfile -t CHANGED_FILES < <(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" --paginate --jq '.[].filename')
          if [ "${#CHANGED_FILES[@]}" -eq 0 ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              "Cannot process \`/approve-sensitive\`: no changed files were found for this PR. Failing closed."
            exit 0
          fi

          SENSITIVE_MATCH=false
          BLOCKING_ACTION=""
          BLOCKING_FILE=""
          BLOCKING_REASON=""

          for FILE in "${CHANGED_FILES[@]}"; do
            [ -n "$FILE" ] || continue

            for ACTION in policy_artifact_change workflow_file_change deploy_policy_change sensitive_app_change; do
              MATCH_JSON=$(bash scripts/check-autonomy-policy.sh match "$ACTION" "$FILE" autonomy-policy.yml)
              MATCHED=$(printf '%s' "$MATCH_JSON" | jq -r '.matched')
              MODE=$(printf '%s' "$MATCH_JSON" | jq -r '.mode')

              if [ "$MATCHED" = "true" ] && [ "$MODE" = "human_required" ]; then
                if [ "$ACTION" = "sensitive_app_change" ]; then
                  SENSITIVE_MATCH=true
                else
                  BLOCKING_ACTION="$ACTION"
                  BLOCKING_FILE="$FILE"
                  BLOCKING_REASON=$(printf '%s' "$MATCH_JSON" | jq -r '.requires_human_reason')
                  break 2
                fi
              fi
            done
          done

          if [ -n "$BLOCKING_ACTION" ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              "Cannot use \`/approve-sensitive\` here. This PR is blocked by \`${BLOCKING_ACTION}\` on \`${BLOCKING_FILE}\`. ${BLOCKING_REASON} Manual human review and merge are still required."
            exit 0
          fi

          if [ "$SENSITIVE_MATCH" != "true" ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              "Cannot use \`/approve-sensitive\` here because no active \`sensitive_app_change\` policy match was found on this PR."
            exit 0
          fi

          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')

          # Set sensitive-review status to success
          gh api --method POST "/repos/${REPO}/statuses/${HEAD_SHA}" \
            -f state="success" \
            -f context="sensitive-review" \
            -f description="Sensitive path approved by @${{ github.event.comment.user.login }}"

          # Re-enable auto-merge
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title --jq '.title')
          if [[ "$PR_TITLE" == "[Pipeline]"* ]] && [ -n "$MERGE_TOKEN" ]; then
            GH_TOKEN="$MERGE_TOKEN" gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash || \
              echo "::warning::Could not enable auto-merge"
          fi

          # Post confirmation
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
            "Sensitive path change approved by @${{ github.event.comment.user.login }}. Auto-merge re-enabled."
          echo "Sensitive path approved for PR #${PR_NUMBER}"
