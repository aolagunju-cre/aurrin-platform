name: Pipeline Scripts CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pipeline-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Verify v2 contracts
        run: |
          if [[ -d scaffold && -d extraction ]]; then
            bash scripts/tests/test-manifest-completeness.sh
            bash scripts/tests/test-manifest-parse.sh
            bash scripts/tests/test-export-scaffold.sh
            bash scripts/tests/test-leak-test.sh
            bash scripts/tests/test-bootstrap-test.sh
            bash scripts/tests/test-publish-scaffold-template.sh
            bash scripts/tests/test-publish-scaffold-template-workflow.sh
            bash scripts/tests/test-validate-prd.sh
            bash scripts/tests/test-validate-schema.sh
            bash scripts/tests/test-classify-transcript.sh
            bash scripts/tests/test-extraction-run.sh
            bash scripts/tests/test-push-to-existing.sh
            bash scripts/tests/test-push-to-existing-golden.sh
            bash scripts/tests/test-retry-state.sh
            bash scripts/tests/test-final-validation-matrix.sh
          else
            echo "Skipping source-repo v2 contract checks"
          fi
      - name: Test pipeline PR classification
        run: bash scripts/tests/test-classify-pipeline-pr.sh
      - name: Test architecture approval dispatch token
        run: bash scripts/tests/test-architecture-approve.sh
      - name: Test auto-dispatch token wiring
        run: bash scripts/tests/test-auto-dispatch.sh
      - name: Test CI validation wiring
        run: bash scripts/tests/test-ci-node-layout.sh
      - name: Test issue dependency extraction
        run: bash scripts/tests/test-extract-issue-dependencies.sh
      - name: Test auto-dispatch requeue token wiring
        run: bash scripts/tests/test-auto-dispatch-requeue.sh
      - name: Test deploy validation wiring
        run: bash scripts/tests/test-deploy-validation-wiring.sh
      - name: Test PRD decomposer contract sections
        run: bash scripts/tests/test-prd-decomposer-contract-sections.sh
      - name: Test Codex lock patch script
        run: bash scripts/tests/test-patch-codex-openrouter-http-locks.sh
      - name: Test GitHub MCP token precedence patch script
        run: bash scripts/tests/test-patch-github-mcp-token-precedence.sh
      - name: Test repo-assist lock patch script
        run: bash scripts/tests/test-patch-repo-assist-lock.sh
      - name: Test pr-review-agent lock patch script
        run: bash scripts/tests/test-patch-pr-review-agent-lock.sh
      - name: Test pr-review-agent activation bypass
        run: bash scripts/tests/test-pr-review-agent-activation.sh
      - name: Test pr-review-agent validation review rules
        run: bash scripts/tests/test-pr-review-agent-validation-review.sh
      - name: Test pr-review dispatch wiring
        run: bash scripts/tests/test-pr-review-dispatch-wiring.sh
      - name: Test pr-review submit policy gate
        run: bash scripts/tests/test-pr-review-submit-policy-gate.sh
      - name: Test repo-assist protected files policy
        run: bash scripts/tests/test-repo-assist.sh
      - name: Test repo-assist validation gate
        run: bash scripts/tests/test-repo-assist-validation-gate.sh
      - name: Test Copilot retry wrapper
        run: bash scripts/tests/test-run-copilot-with-retry.sh
      - name: Test implementation validator
        run: bash scripts/tests/test-validate-implementation.sh
