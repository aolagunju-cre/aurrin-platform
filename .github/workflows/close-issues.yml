#
# Close Linked Issues — Closes issues referenced by "Closes #N" in merged PRs.
#
# Isolated from pr-review-submit to avoid concurrency group conflicts that
# previously caused this job to be cancelled on every run.
#

name: "Close Linked Issues"

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  actions: write
  issues: write
  pull-requests: read

# Unique per-PR, never cancel — closing is idempotent and must complete
concurrency:
  group: "close-issues-${{ github.event.pull_request.number }}"
  cancel-in-progress: false

jobs:
  close-issues:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/extract-linked-issue-numbers.sh
            scripts/extract-issue-dependencies.sh
            scripts/extract-child-issue-numbers.sh
            scripts/reconcile-parent-pipeline-issues.sh
          sparse-checkout-cone-mode: false

      - name: Close linked issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          ISSUES=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body // ""' \
            | bash scripts/extract-linked-issue-numbers.sh "$REPO")

          if [ -z "$ISSUES" ]; then
            echo "No issue-closing references found in PR #${PR_NUMBER} body."
            exit 0
          fi

          for ISSUE_NUM in $ISSUES; do
            LABELS=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
            if printf '%s' "$LABELS" | grep -Eq '(^|,)pipeline(,|$)' && \
               printf '%s' "$LABELS" | grep -Eq '(^|,)(feature|bug|test|docs)(,|$)'; then
              gh issue comment "$ISSUE_NUM" --repo "$REPO" \
                --body "Issue closure deferred pending post-deploy validation." >/dev/null || \
                echo "::warning::Could not record validation deferral on issue #${ISSUE_NUM}"
              echo "Deferred closing issue #${ISSUE_NUM} pending validation"
              continue
            fi

            STATE=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
            if [ "$STATE" = "OPEN" ]; then
              gh issue close "$ISSUE_NUM" --repo "$REPO" \
                -c "Closed by merge of PR #${PR_NUMBER}." || \
                echo "::warning::Could not close issue #${ISSUE_NUM}"
              echo "Closed issue #${ISSUE_NUM}"
            else
              echo "Issue #${ISSUE_NUM} is already ${STATE}"
            fi
          done

      - name: Reconcile blocked parent pipeline issues
        id: reconcile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          RESULT=$(bash scripts/reconcile-parent-pipeline-issues.sh)
          printf '%s\n' "$RESULT"
          ACTIONS_TAKEN=$(printf '%s' "$RESULT" | jq -r '.actions_taken // 0')
          echo "actions_taken=${ACTIONS_TAKEN}" >> "$GITHUB_OUTPUT"

      - name: Dispatch requeue after parent reconciliation
        if: steps.reconcile.outputs.actions_taken != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIMARY_DISPATCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FALLBACK_DISPATCH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          dispatch_and_confirm() {
            local token=$1
            local label=$2
            local attempts=$3
            local attempt
            local poll
            local before
            local dispatch_output
            local run_url
            local run_id

            [ -z "$token" ] && return 1

            for attempt in $(seq 1 "$attempts"); do
              before=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

              if ! dispatch_output=$(GH_TOKEN="$token" gh workflow run auto-dispatch-requeue.yml --repo "$REPO" 2>&1); then
                echo "::warning::${label} dispatch attempt ${attempt}/${attempts} failed for auto-dispatch-requeue."
                printf '%s\n' "$dispatch_output"
                continue
              fi

              printf '%s\n' "$dispatch_output"
              run_url=$(printf '%s\n' "$dispatch_output" | grep -Eo 'https://github\.com/[^[:space:]]+/actions/runs/[0-9]+' | tail -1 || true)
              run_id=""
              if [ -n "$run_url" ]; then
                run_id="${run_url##*/}"
              fi

              for poll in $(seq 1 12); do
                sleep 5
                if [ -n "$run_id" ]; then
                  if GH_TOKEN="$token" gh run view "$run_id" --repo "$REPO" --json databaseId --jq '.databaseId' >/dev/null 2>&1; then
                    echo "Confirmed auto-dispatch-requeue run ${run_id} after ${label} dispatch."
                    return 0
                  fi
                else
                  run_id=$(
                    GH_TOKEN="$token" gh api "/repos/${REPO}/actions/workflows/auto-dispatch-requeue.yml/runs?event=workflow_dispatch&per_page=20" \
                      --jq --arg since "$before" '
                        .workflow_runs
                        | map(select(.created_at >= $since))
                        | sort_by(.created_at)
                        | reverse
                        | .[0].id // empty
                      ' 2>/dev/null || true
                  )
                fi

                if [ -n "$run_id" ] && GH_TOKEN="$token" gh run view "$run_id" --repo "$REPO" --json databaseId --jq '.databaseId' >/dev/null 2>&1; then
                  echo "Confirmed auto-dispatch-requeue run ${run_id} after ${label} dispatch."
                  return 0
                fi
              done

              echo "::warning::${label} dispatch attempt ${attempt}/${attempts} did not create a detectable auto-dispatch-requeue run."
            done

            return 1
          }

          OPEN_PIPELINE_PRS=$(
            gh pr list --repo "$REPO" --state open --json title \
              --jq '[.[] | select(.title | startswith("[Pipeline]"))] | length'
          )
          if [ "${OPEN_PIPELINE_PRS}" -gt 0 ]; then
            echo "Open pipeline PRs remain (${OPEN_PIPELINE_PRS}). Skipping reconciliation-driven requeue dispatch."
            exit 0
          fi

          if [ -z "$PRIMARY_DISPATCH_TOKEN" ] && [ -z "$FALLBACK_DISPATCH_TOKEN" ]; then
            echo "::error::A dispatch token is required to trigger auto-dispatch-requeue after parent reconciliation."
            exit 1
          fi

          if ! dispatch_and_confirm "$PRIMARY_DISPATCH_TOKEN" "primary" 2; then
            echo "::warning::Primary dispatch token did not produce a verified requeue run after parent reconciliation; retrying with fallback token."
            if ! dispatch_and_confirm "$FALLBACK_DISPATCH_TOKEN" "fallback" 1; then
              echo "::error::Dispatch requeue after parent reconciliation reported success path but no auto-dispatch-requeue run was created."
              exit 1
            fi
          fi

          echo "Dispatched and verified auto-dispatch-requeue after parent reconciliation."
